<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Request Portal V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #626d7a;
            --accent: #000000;
            --accent-hover: #222222;
            --border-color: #e2e8f0;
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        header {
            margin-bottom: 36px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
        }

        select, input, textarea {
            width: 100%;
            padding: 14px;
            background: #fdfdfd;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--accent);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.03);
        }

        .grid-days {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .day-card {
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 10px;
            background: #ffffff;
            transition: border-color 0.2s;
        }

        .day-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 14px;
            border-left: 3px solid var(--accent);
            padding-left: 8px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 32px;
        }

        button {
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            color: var(--text-main);
        }

        .success-screen {
            text-align: center;
            padding: 40px 0;
        }

        .success-icon {
            width: 56px;
            height: 56px;
            background: #e6f7f5;
            color: #00a896;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }

        .success-icon svg {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Schedule Request Portal</h1>
        <p>Genera tu solicitud de horarios exportable directamente a formato Excel unificado.</p>
    </header>

    <div id="step-1" class="step active">
        <label for="department">Departamento / Equipo</label>
        <select id="department" onchange="loadNames()">
            <option value="">Selecciona un departamento...</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Deposits">Deposits</option>
            <option value="Payouts">Payouts</option>
        </select>

        <label for="clerk-name">Nombre del Agente</label>
        <select id="clerk-name" disabled>
            <option value="">Primero selecciona un departamento...</option>
        </select>

        <div class="btn-group" style="justify-content: flex-end;">
            <button class="btn-primary" onclick="nextStep(2)">Continuar</button>
        </div>
    </div>

    <div id="step-2" class="step">
        <div class="grid-days">
            <script>
                const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
                days.forEach(day => {
                    document.write(`
                        <div class="day-card">
                            <div class="day-title">${day}</div>
                            <label style="font-size:11px;">Bloque Preferido</label>
                            <select class="schedule-pref" data-day="${day}">
                                <option value="AM Shift">Mañana (AM Shift)</option>
                                <option value="PM Shift">Tarde (PM Shift)</option>
                                <option value="Graveyard Shift">Noche (Graveyard)</option>
                                <option value="Day Off">Día Libre (Day Off)</option>
                            </select>
                            <input type="text" class="day-comment" data-day="${day}" placeholder="Especificar horas o detalles...">
                        </div>
                    `);
                });
            </script>
        </div>

        <label for="general-notes">Notas u Observaciones del Supervisor / Agente</label>
        <textarea id="general-notes" rows="3" placeholder="Comentarios adicionales referentes a la semana..."></textarea>

        <div class="btn-group">
            <button class="btn-secondary" onclick="prevStep(1)">Atrás</button>
            <button class="btn-primary" onclick="generateExcelFile()">Descargar archivo Excel</button>
        </div>
    </div>

    <div id="step-3" class="step">
        <div class="success-screen">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2>¡Tu archivo Excel ha sido generado!</h2>
            <p style="color: var(--text-muted); margin-top: 8px; margin-bottom: 24px;">El archivo se descargó de manera automática. Compártelo con tu líder de equipo.</p>
            <button class="btn-secondary" onclick="prevStep(1)">Crear otra solicitud</button>
        </div>
    </div>
</div>

<script>
    // Datos limpios extraídos del archivo original
    const teamData = {
        "Customer Service": [
            "Cristopher Sandoval", "Kendra Temple", "María José Fallas", "Natalia Sibaja", "Pablo Retana", 
            "Victor Ramírez", "Luis Carvajal", "Kendall Montoya", "Josué Vargas", "Kevin Salazar", 
            "Israel Aburto", "Vanessa Umana", "Naigell Beckford", "Nicole Román", "Mariana Varela", 
            "Tamara Donaire", "Eckart Lutz", "Isaac Porras", "Michelle Saborio", "Emerson Hernandez", 
            "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", "Elena Rojas", "Elliot Navarro", 
            "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros", "Andrey Castillo", "Rory Bulgarelli", 
            "Phillip Desanti", "Eddison Prendas", "Naomy Sanchez ", "Adrian Navarro", "Carlos Alejandro Amador Luna", 
            "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Carolina Castro", 
            "Daniel Leandro Rojas", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Luis Fernando Ruiz", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Deposits": [
            "Mariana Bejarano", "Cristopher Sandoval", "Eddison Prendas", "Diego Matamoros"
        ],
        "Payouts": [
            "Carlos Amador", "Fer Blanco", "Graciela Bravo ", "Ignacio Blanco", "Kevin Zamora", 
            "Samuel Carballo", "Sheydron Clark", "Sebastian Rivera", "Silvana Suarez"
        ]
    };

    // Mapeo estricto de colores sofisticados (Estilo Pastel Premium para Excel)
    const colorPalette = {
        "AM Shift": { bg: "E2EFDA", fg: "375623" },        // Verde suave
        "PM Shift": { bg: "FFF2CC", fg: "7F6000" },        // Amarillo suave
        "Graveyard Shift": { bg: "FCE4D6", fg: "C65911" }, // Naranja opaco elegante
        "Day Off": { bg: "E9EDF4", fg: "595959" }          // Gris/Azul tenue para descanso
    };

    function loadNames() {
        const deptSelect = document.getElementById('department');
        const nameSelect = document.getElementById('clerk-name');
        const selectedDept = deptSelect.value;

        nameSelect.innerHTML = '';

        if (!selectedDept) {
            nameSelect.innerHTML = '<option value="">Primero selecciona un departamento...</option>';
            nameSelect.disabled = true;
            return;
        }

        nameSelect.disabled = false;
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.textContent = "Selecciona tu nombre...";
        nameSelect.appendChild(defaultOption);

        teamData[selectedDept].forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            nameSelect.appendChild(option);
        });
    }

    function nextStep(stepNum) {
        if (stepNum === 2) {
            const dept = document.getElementById('department').value;
            const name = document.getElementById('clerk-name').value;
            if (!dept || !name) {
                alert('Por favor selecciona departamento y nombre.');
                return;
            }
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step-${stepNum}`).classList.add('active');
    }

    function prevStep(stepNum) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step-${stepNum}`).classList.add('active');
    }

    async function generateExcelFile() {
        const dept = document.getElementById('department').value;
        const name = document.getElementById('clerk-name').value;
        const generalNotes = document.getElementById('general-notes').value || "None";

        // Instanciar Workbook de ExcelJS
        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Schedule Request');

        // Configuración de columnas
        worksheet.columns = [
            { header: 'Agent Name', key: 'name', width: 28 },
            { header: 'Department', key: 'dept', width: 20 },
            { header: 'Day', key: 'day', width: 15 },
            { header: 'Shift Preference', key: 'pref', width: 22 },
            { header: 'Specific Notes', key: 'notes', width: 30 },
            { header: 'General Comments', key: 'general', width: 35 }
        ];

        // Estilo del Header Principal de Excel
        worksheet.getRow(1).font = { name: 'Segoe UI', bold: true, color: { argb: 'FFFFFF' }, size: 11 };
        worksheet.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '1A1A1A' } };
        worksheet.getRow(1).alignment = { vertical: 'middle', horizontal: 'center' };
        worksheet.getRow(1).height = 26;

        // Iterar sobre los datos capturados en pantalla
        const selects = document.querySelectorAll('.schedule-pref');
        selects.forEach((select, index) => {
            const day = select.getAttribute('data-day');
            const pref = select.value;
            const comment = document.querySelector(`.day-comment[data-day="${day}"]`).value || "Standard Shift";

            // Añadir fila de datos
            const row = worksheet.addRow({
                name: (index === 0) ? name : '',
                dept: (index === 0) ? dept : '',
                day: day,
                pref: pref,
                notes: comment,
                general: (index === 0) ? generalNotes : ''
            });

            // Altura de fila cómoda
            row.height = 22;

            // Alineaciones por celda
            row.getCell('name').font = { bold: true, name: 'Segoe UI' };
            row.getCell('day').font = { bold: true, name: 'Segoe UI' };
            row.getCell('day').alignment = { horizontal: 'center' };
            row.getCell('pref').alignment = { horizontal: 'center' };

            // Aplicar paleta de colores dinámicos a la columna de Turnos Preferidos
            if (colorPalette[pref]) {
                const colorConfig = colorPalette[pref];
                row.getCell('pref').fill = {
                    type: 'pattern',
                    pattern: 'solid',
                    fgColor: { argb: 'FF' + colorConfig.bg }
                };
                row.getCell('pref').font = {
                    color: { argb: 'FF' + colorConfig.fg },
                    bold: true,
                    name: 'Segoe UI',
                    size: 10
                };
            }

            // Añadir bordes limpios y discretos a las celdas
            ['name', 'dept', 'day', 'pref', 'notes', 'general'].forEach(colKey => {
                row.getCell(colKey).border = {
                    bottom: { style: 'thin', color: { argb: 'FFE2E8F0' } },
                    right: { style: 'thin', color: { argb: 'FFE2E8F0' } }
                };
            });
        });

        // Escribir el archivo en memoria y forzar descarga local en el navegador
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const link = document.createElement("a");
        
        // Nombre del archivo personalizado e impecable
        link.href = URL.createObjectURL(blob);
        link.download = `Schedule_Request_${name.replace(/\s+/g, '_')}.xlsx`;
        link.click();

        // Mover a la pantalla final de éxito
        nextStep(3);
    }
</script>
</body>
</html>
