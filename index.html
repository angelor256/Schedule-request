<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Dynasty — Roster Center</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-glow: linear-gradient(135deg, #050814 0%, #0c102b 50%, #060919 100%);
            --panel-bg: rgba(13, 19, 43, 0.75);
            --border-neon: rgba(0, 242, 254, 0.15);
            --border-neon-hover: rgba(0, 242, 254, 0.4);
            
            /* Paleta Viva */
            --neon-cyan: #00f2fe;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --neon-yellow: #ffde00;
            
            --text-light: #f1f5f9;
            --text-dark: #050814;
            --font-main: 'Outfit', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg-glow);
            color: var(--text-light);
            font-family: var(--font-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Elementos decorativos vivos en el fondo */
        body::before {
            content: ''; position: absolute; width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.2) 0%, transparent 70%);
            top: 10%; right: 5%; z-index: -1; pointer-events: none;
        }
        body::after {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, transparent 70%);
            bottom: 10%; left: 5%; z-index: -1; pointer-events: none;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 45px;
            border: 1px solid var(--border-neon);
            box-shadow: 0 20px 60px rgba(0, 242, 254, 0.08), inset 0 1px 2px rgba(255,255,255,0.1);
            margin-bottom: 35px;
            transition: border-color 0.3s ease;
        }
        .main-container:hover {
            border-color: rgba(0, 242, 254, 0.25);
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.08);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        .brand-title {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        /* Botones Eléctricos */
        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:hover {
            background: var(--neon-pink);
            color: #ffffff;
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: var(--neon-cyan);
            color: var(--text-dark);
            border: none;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
        .btn-primary:hover {
            background: #ffffff;
            color: var(--text-dark);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        .view-layer { display: none; }
        .view-layer.active { display: block; }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            margin-bottom: 12px;
            font-weight: 600;
        }

        select, textarea, input {
            width: 100%;
            background: rgba(5, 8, 20, 0.8);
            border: 1px solid var(--border-neon);
            padding: 16px 20px;
            border-radius: 14px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
            margin-bottom: 30px;
        }
        select:focus, input:focus { 
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Cuadrícula de Nombres Estilo Botones de Energía */
        .mesh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            padding: 4px;
            margin-bottom: 35px;
        }
        .mesh-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .mesh-item:hover {
            border-color: var(--neon-cyan);
            color: #fff;
            background: rgba(0, 242, 254, 0.05);
        }
        .mesh-item.selected {
            background: var(--neon-cyan);
            border-color: var(--neon-cyan);
            color: var(--text-dark);
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        /* Matriz de Horarios */
        .table-container {
            width: 100%;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            background: rgba(5, 8, 20, 0.5);
            margin-bottom: 35px;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
        }
        .matrix-table th {
            padding: 20px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: left;
        }
        .matrix-table td {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Selectores de Celda con Colores "Vivos" */
        .cell-select {
            width: 100%;
            padding: 12px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 10px;
            margin-bottom: 0;
            background: rgba(5,8,20,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .cell-select.st-active { 
            border-color: var(--neon-cyan); 
            color: var(--neon-cyan); 
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }
        .cell-select.st-off { 
            border-color: var(--neon-pink); 
            color: var(--neon-pink); 
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.1);
        }
        .cell-select.st-vacation { 
            border-color: var(--neon-yellow); 
            color: var(--neon-yellow); 
            box-shadow: 0 0 10px rgba(255, 222, 0, 0.15);
        }
        .cell-select.st-open { 
            border-color: var(--neon-green); 
            color: var(--neon-green); 
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.15);
        }

        /* Panel de Control de Personal (Consola Abajo) */
        .management-card {
            width: 100%;
            max-width: 1200px;
            background: rgba(10, 16, 41, 0.9);
            border: 1px solid rgba(255, 0, 127, 0.15);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(255, 0, 127, 0.05);
        }
        .mgmt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        .sub-panel {
            background: rgba(5, 8, 20, 0.6);
            padding: 22px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mgmt-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 18px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Scrollbars Estilo Neon Stream */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-area">
        <div class="brand-title">Panda Roster Matrix</div>
        <button class="btn-action" onclick="triggerExcelExport()">Export Roster</button>
    </div>

    <!-- PANTALLA 1: HOME & FILTROS -->
    <div id="step-1" class="view-layer active">
        <label>Operational Division</label>
        <select id="department" onchange="loadStaffMesh()">
            <option value="">Choose Division...</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Deposits">Deposits</option>
            <option value="Payouts">Payouts</option>
        </select>

        <div id="mesh-wrapper" style="display:none;">
            <label>Select Team Member</label>
            <div class="mesh-grid" id="staff-mesh"></div>
        </div>

        <div style="text-align: right; margin-top: 25px;">
            <button class="btn-action btn-primary" onclick="goToMatrix()">Open Matrix Board</button>
        </div>
    </div>

    <!-- PANTALLA 2: MATRIZ DE ASIGNACIÓN -->
    <div id="step-2" class="view-layer">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Asigning:</span>
            <span id="active-agent-title" style="font-size: 20px; font-weight: 700; color: var(--neon-cyan); font-family: var(--font-display);">---</span>
        </div>

        <div class="table-container">
            <table class="matrix-table">
                <thead>
                    <tr>
                        <th>Monday</th>
                        <th>Tuesday</th>
                        <th>Wednesday</th>
                        <th>Thursday</th>
                        <th>Friday</th>
                        <th>Saturday</th>
                        <th>Sunday</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><select class="cell-select day-input" data-day="Monday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Tuesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Wednesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Thursday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Friday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Saturday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Sunday" onchange="refreshCellClass(this)"></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <label>Operational Notes / Special Justifications</label>
        <textarea id="matrix-notes" rows="2" placeholder="Write any internal observation here..."></textarea>

        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button class="btn-action" onclick="backToStep1()">Back</button>
            <button class="btn-action btn-primary" onclick="commitSchedule()">Save to Memory</button>
        </div>
    </div>

    <!-- PANTALLA 3: COMPLETADO -->
    <div id="step-3" class="view-layer" style="text-align:center; padding: 50px 0;">
        <h3 style="font-family: var(--font-display); font-size: 26px; margin-bottom: 15px; color: var(--neon-green);">✨ Schedule Logs Secured</h3>
        <p style="color: #94a3b8; font-size: 15px; margin-bottom: 30px;">Local database has been refreshed with the new entries.</p>
        <button class="btn-action btn-primary" onclick="resetFlow()">Next Profile</button>
    </div>
</div>

<!-- PANEL PREMIUM DE CONTROL DE PERSONAL (CRUD) -->
<div class="management-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-family: var(--font-display); font-size: 16px; font-weight:700; color: var(--neon-pink);">⚙️ Team Management Console</div>
        <button class="btn-action" style="padding: 8px 16px; font-size:11px;" onclick="toggleMgmtPanel()">Unlock Tools</button>
    </div>

    <div id="mgmt-panel-content" class="mgmt-grid" style="display:none;">
        <!-- AGREGAR -->
        <div class="sub-panel">
            <div class="mgmt-title" style="color: var(--neon-cyan);">➕ Add Collaborator</div>
            <input type="text" id="add-name" placeholder="Full Name">
            <select id="add-dept">
                <option value="Customer Service">Customer Service</option>
                <option value="Deposits">Deposits</option>
                <option value="Payouts">Payouts</option>
            </select>
            <button class="btn-action btn-primary" style="width:100%;" onclick="executeAddMember()">Save Profile</button>
        </div>

        <!-- REASIGNAR -->
        <div class="sub-panel">
            <div class="mgmt-title" style="color: var(--neon-yellow);">🔄 Change Division</div>
            <select id="transfer-agent-select"><option value="">Select Member...</option></select>
            <select id="transfer-new-dept">
                <option value="Customer Service">Customer Service</option>
                <option value="Deposits">Deposits</option>
                <option value="Payouts">Payouts</option>
            </select>
            <button class="btn-action" style="width:100%;" onclick="executeTransfer()">Transfer Hub</button>
        </div>

        <!-- BORRAR -->
        <div class="sub-panel">
            <div class="mgmt-title" style="color: var(--neon-pink);">❌ Delete Profile</div>
            <select id="delete-agent-select"><option value="">Select Member...</option></select>
            <button class="btn-action" style="width:100%; background: rgba(255, 0, 127, 0.1); border-color: var(--neon-pink); color: var(--neon-pink);" onclick="executeDeleteMember()">Purge Data</button>
        </div>
    </div>
</div>

<script>
    const defaultTeam = {
        "Customer Service": [
            "Cristopher Sandoval", "Kendra Temple", "María José Fallas", "Natalia Sibaja", "Pablo Retana", 
            "Victor Ramírez", "Luis Carvajal", "Kendall Montoya", "Josué Vargas", "Kevin Salazar", 
            "Israel Aburto", "Vanessa Umana", "Naigell Beckford", "Nicole Román", "Mariana Varela", 
            "Tamara Donaire", "Eckart Lutz", "Isaac Porras", "Michelle Saborio", "Emerson Hernandez", 
            "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", "Elena Rojas", "Elliot Navarro", 
            "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros", "Andrey Castillo", "Rory Bulgarelli", 
            "Phillip Desanti", "Eddison Prendas", "Naomy Sanchez ", "Adrian Navarro", "Carlos Alejandro Amador Luna", 
            "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Carolina Castro", 
            "Daniel Leandro Rojas", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Luis Fernando Ruiz", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Deposits": ["Mariana Bejarano", "Cristopher Sandoval", "Eddison Prendas", "Diego Matamoros"],
        "Payouts": ["Carlos Amador", "Fer Blanco", "Graciela Bravo ", "Ignacio Blanco", "Kevin Zamora", "Samuel Carballo", "Sheydron Clark", "Sebastian Rivera", "Silvana Suarez"]
    };

    if (!localStorage.getItem('panda_staff_db')) {
        localStorage.setItem('panda_staff_db', JSON.stringify(defaultTeam));
    }

    let currentAgent = "";
    let mgmtUnlocked = false;

    function getStaffData() { return JSON.parse(localStorage.getItem('panda_staff_db')); }

    function saveStaffData(data) {
        localStorage.setItem('panda_staff_db', JSON.stringify(data));
        loadStaffMesh();
        populateMgmtDropdowns();
    }

    function toggleMgmtPanel() {
        if (!mgmtUnlocked) {
            const pass = prompt("Access Key Required:");
            if (pass !== "Sups2019") { alert("Access Denied."); return; }
            mgmtUnlocked = true;
        }
        const panel = document.getElementById('mgmt-panel-content');
        panel.style.display = panel.style.display === 'none' ? 'grid' : 'none';
        populateMgmtDropdowns();
    }

    function loadStaffMesh() {
        const dept = document.getElementById('department').value;
        const wrapper = document.getElementById('mesh-wrapper');
        const mesh = document.getElementById('staff-mesh');
        mesh.innerHTML = '';
        currentAgent = "";

        if (!dept) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = 'block';

        getStaffData()[dept].forEach(name => {
            const item = document.createElement('div');
            item.className = 'mesh-item';
            item.textContent = name;
            item.onclick = () => {
                document.querySelectorAll('.mesh-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentAgent = name;
            };
            mesh.appendChild(item);
        });
    }

    function goToMatrix() {
        if (!currentAgent) { alert("Please click on a staff name layout."); return; }
        document.getElementById('step-1').classList.remove('active');
        document.getElementById('step-2').classList.add('active');
        document.getElementById('active-agent-title').textContent = currentAgent;
        buildMatrixOptions();
    }

    function buildMatrixOptions() {
        const rules = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const noWeekendOff = ["Keisha Cross Brown", ...rules];

        const isRestricted = rules.includes(currentAgent);
        const blockWeekendOff = noWeekendOff.includes(currentAgent);

        document.querySelectorAll('.day-input').forEach(select => {
            const day = select.getAttribute('data-day');
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let html = '';

            if (isRestricted) {
                html += `
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                `;
            } else {
                html += `
                    <option value="06:00 - 14:00">06:00 - 14:00</option>
                    <option value="07:00 - 15:00">07:00 - 15:00</option>
                    <option value="08:00 - 16:00">08:00 - 16:00</option>
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="12:00 - 20:00">12:00 - 20:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                    <option value="14:00 - 22:00">14:00 - 22:00</option>
                    <option value="15:00 - 23:00">15:00 - 23:00</option>
                `;
            }

            html += `<option value="OPEN">✨ OPEN</option>`;
            html += `<option value="Vacaciones">🌴 Vacaciones</option>`;

            if (!(isWeekend && blockWeekendOff)) {
                html += `<option value="Day Off">🛑 Day Off</option>`;
            }

            select.innerHTML = html;
            refreshCellClass(select);
        });
    }

    function refreshCellClass(elem) {
        elem.classList.remove('st-active', 'st-off', 'st-vacation', 'st-open');
        if (elem.value === "Day Off") elem.classList.add('st-off');
        else if (elem.value === "Vacaciones") elem.classList.add('st-vacation');
        else if (elem.value === "OPEN") elem.classList.add('st-open');
        else elem.classList.add('st-active');
    }

    function backToStep1() {
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
    }

    function commitSchedule() {
        const dept = document.getElementById('department').value;
        const notes = document.getElementById('matrix-notes').value || "None";
        const targetDays = {};

        document.querySelectorAll('.day-input').forEach(sel => {
            targetDays[sel.getAttribute('data-day')] = sel.value;
        });

        let masterRoster = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        masterRoster = masterRoster.filter(r => r.name !== currentAgent);

        masterRoster.push({
            name: currentAgent,
            dept: dept,
            selections: targetDays,
            notes: notes,
            timestamp: new Date().toISOString()
        });

        localStorage.setItem('panda_master_roster', JSON.stringify(masterRoster));
        
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-3').classList.add('active');
    }

    function resetFlow() {
        document.getElementById('matrix-notes').value = "";
        document.getElementById('step-3').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
        loadStaffMesh();
    }

    function populateMgmtDropdowns() {
        const db = getStaffData();
        const transSel = document.getElementById('transfer-agent-select');
        const delSel = document.getElementById('delete-agent-select');

        transSel.innerHTML = '<option value="">Select Member...</option>';
        delSel.innerHTML = '<option value="">Select Member...</option>';

        Object.keys(db).forEach(dept => {
            db[dept].forEach(name => {
                const innerText = `${name} (${dept})`;
                const valueString = JSON.stringify({name, dept});
                
                transSel.appendChild(new Option(innerText, valueString));
                delSel.appendChild(new Option(innerText, valueString));
            });
        });
    }

    function executeAddMember() {
        const name = document.getElementById('add-name').value.trim();
        const dept = document.getElementById('add-dept').value;
        if(!name) return alert("Write a proper name.");
        
        const db = getStaffData();
        if(db[dept].includes(name)) return alert("Entry already active.");

        db[dept].push(name); db[dept].sort();
        saveStaffData(db);
        document.getElementById('add-name').value = "";
        alert("Saved successfully.");
    }

    function executeTransfer() {
        const targetRaw = document.getElementById('transfer-agent-select').value;
        const newDept = document.getElementById('transfer-new-dept').value;
        if(!targetRaw) return alert("Select target.");

        const target = JSON.parse(targetRaw);
        if(target.dept === newDept) return alert("Target already in division.");

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        db[newDept].push(target.name); db[newDept].sort();
        saveStaffData(db);
        alert("Division updated.");
    }

    function executeDeleteMember() {
        const targetRaw = document.getElementById('delete-agent-select').value;
        if(!targetRaw) return alert("Select target.");
        
        const target = JSON.parse(targetRaw);
        if(!confirm(`Delete permanently: ${target.name}?`)) return;

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        saveStaffData(db);
        alert("Purged complete.");
    }

    async function triggerExcelExport() {
        const auth = prompt("Admin Key:");
        if (auth !== "Sups2019") return alert("Unauthorized.");

        const master = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        if(!master.length) return alert("No inputs found to save.");

        const wb = new ExcelJS.Workbook();
        ["Customer Service", "Deposits", "Payouts"].forEach(dKey => {
            const list = master.filter(m => m.dept === dKey);
            if(!list.length) return;

            const ws = wb.addWorksheet(dKey);
            ws.columns = [
                { header: 'Agent Name', key: 'name', width: 26 },
                { header: 'Monday', key: 'Monday', width: 16 },
                { header: 'Tuesday', key: 'Tuesday', width: 16 },
                { header: 'Wednesday', key: 'Wednesday', width: 16 },
                { header: 'Thursday', key: 'Thursday', width: 16 },
                { header: 'Friday', key: 'Friday', width: 16 },
                { header: 'Saturday', key: 'Saturday', width: 16 },
                { header: 'Sunday', key: 'Sunday', width: 16 },
                { header: 'Notes', key: 'notes', width: 30 }
            ];

            const hr = ws.getRow(1); hr.height = 25;
            hr.font = { bold: true, color: { argb: 'FFFFFF' }, name: 'Segoe UI' };
            hr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '0C102B' } };
            hr.alignment = { vertical: 'middle', horizontal: 'center' };

            list.forEach(entry => {
                const dataRow = { name: entry.name, notes: entry.notes, ...entry.selections };
                const row = ws.addRow(dataRow); row.height = 22;
                row.getCell('name').font = { bold: true, name: 'Segoe UI' };
                row.getCell('name').alignment = { vertical: 'middle' };

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(day => {
                    const cell = row.getCell(day);
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.font = { name: 'Segoe UI', bold: true, size: 10 };

                    let bg = "FFFFFF"; let fg = "000000";
                    if(dataRow[day] === "Day Off") { bg = "FF007F"; fg = "FFFFFF"; }
                    else if(dataRow[day] === "Vacaciones") { bg = "FFDE00"; fg = "000000"; }
                    else if(dataRow[day] === "OPEN") { bg = "39FF14"; fg = "000000"; }
                    else { bg = "00F2FE"; fg = "000000"; }

                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bg } };
                    cell.font.color = { argb: 'FF' + fg };
                });
            });
        });

        const buf = await wb.xlsx.writeBuffer();
        const b = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `Panda_Roster_Vibrant.xlsx`;
        a.click();
    }
</script>
