<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Dynasty — Roster Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-base: #eecfbf0; /* Arena / Crema cálido */
            --bg-container: #e3dfd5;
            --olive-deep: #4a532b; /* Verde oliva de la referencia */
            --text-dark: #1e2315;
            --text-muted: #6b715c;
            --border-fine: rgba(74, 83, 43, 0.15);
            
            /* Estados en tonos orgánicos sofisticados */
            --st-active-bg: #f4f2ed;
            --st-off-color: #a96151; /* Terracota apagado */
            --st-vacation-color: #c49a45; /* Ocre suave */
            --st-open-color: #6e8467; /* Verde salvia */
            
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #eae6dc;
            color: var(--text-dark);
            font-family: var(--font-sans);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: -0.01em;
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-container);
            border-radius: 4px; /* Bordes rectos y limpios, más editoriales */
            padding: 50px;
            border: 1px solid var(--border-fine);
            box-shadow: 0 30px 70px rgba(74, 83, 43, 0.06);
            margin-bottom: 40px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border-fine);
            padding-bottom: 20px;
            margin-bottom: 45px;
        }

        .brand-title {
            font-family: var(--font-serif);
            font-size: 38px;
            font-weight: 400;
            color: var(--olive-deep);
            font-style: italic;
        }

        /* Botones de Estilo Atemporal */
        .btn-action {
            background: transparent;
            border: 1px solid var(--olive-deep);
            color: var(--olive-deep);
            padding: 10px 24px;
            border-radius: 0px; /* Rectangular de alta gama */
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-action:hover {
            background: var(--olive-deep);
            color: #ffffff;
        }
        .btn-primary {
            background: var(--olive-deep);
            color: #ffffff;
        }
        .btn-primary:hover {
            background: transparent;
            color: var(--olive-deep);
        }

        .view-layer { display: none; }
        .view-layer.active { display: block; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--text-muted);
            margin-bottom: 14px;
            font-weight: 500;
        }

        select, textarea, input {
            width: 100%;
            background: #f4f2ed;
            border: 1px solid var(--border-fine);
            padding: 14px 18px;
            border-radius: 0px;
            color: var(--text-dark);
            font-size: 14px;
            font-family: var(--font-sans);
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 35px;
        }
        select:focus, input:focus { 
            border-color: var(--olive-deep);
            background: #ffffff;
        }

        /* Grid de Selección Estilo Galería */
        .mesh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 1px;
            background: var(--border-fine);
            max-height: 290px;
            overflow-y: auto;
            margin-bottom: 40px;
            border: 1px solid var(--border-fine);
        }
        .mesh-item {
            background: #f4f2ed;
            padding: 18px;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-dark);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }
        .mesh-item:hover {
            background: #ebe7de;
        }
        .mesh-item.selected {
            background: var(--olive-deep);
            color: #ffffff;
        }

        /* Tabla de Horarios Minimalista */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 40px;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        .matrix-table th {
            padding: 16px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--olive-deep);
            text-align: left;
            font-weight: 500;
        }
        .matrix-table td {
            padding: 10px 6px;
            border-bottom: 1px solid var(--border-fine);
        }

        /* Selectores dentro de la Matriz */
        .cell-select {
            width: 100%;
            padding: 10px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 0px;
            margin-bottom: 0;
            background: #f4f2ed;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .cell-select.st-active { 
            color: var(--text-dark);
            border-color: var(--border-fine);
        }
        .cell-select.st-off { 
            color: var(--st-off-color); 
            background: rgba(169, 97, 81, 0.06);
            border-color: rgba(169, 97, 81, 0.2);
        }
        .cell-select.st-vacation { 
            color: var(--st-vacation-color); 
            background: rgba(196, 154, 69, 0.06);
            border-color: rgba(196, 154, 69, 0.2);
        }
        .cell-select.st-open { 
            color: var(--st-open-color); 
            background: rgba(110, 132, 103, 0.06);
            border-color: rgba(110, 132, 103, 0.2);
        }

        /* Consola de Gestión inferior */
        .management-card {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-container);
            border: 1px solid var(--border-fine);
            border-radius: 4px;
            padding: 35px 50px;
        }
        .mgmt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .sub-panel {
            background: #f4f2ed;
            padding: 24px;
            border: 1px solid var(--border-fine);
        }
        .mgmt-title {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 20px;
            color: var(--olive-deep);
        }

        /* Estilización de Scroll */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-area">
        <div class="brand-title">Panda Roster Studio</div>
        <button class="btn-action" onclick="triggerExcelExport()">Export Sheet</button>
    </div>

    <!-- ESCENA 1: SELECCIÓN -->
    <div id="step-1" class="view-layer active">
        <label>Operational Division</label>
        <select id="department" onchange="loadStaffMesh()">
            <option value="">Select Department...</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Deposits">Deposits</option>
            <option value="Payouts">Payouts</option>
        </select>

        <div id="mesh-wrapper" style="display:none;">
            <label>Team Members</label>
            <div class="mesh-grid" id="staff-mesh"></div>
        </div>

        <div style="text-align: right; margin-top: 10px;">
            <button class="btn-action btn-primary" onclick="goToMatrix()">Configure Schedule</button>
        </div>
    </div>

    <!-- ESCENA 2: PLACA DE HORARIOS -->
    <div id="step-2" class="view-layer">
        <div style="margin-bottom: 30px;">
            <span style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Editing Profile</span>
            <div id="active-agent-title" style="font-size: 28px; font-family: var(--font-serif); color: var(--olive-deep); margin-top: 4px;">---</div>
        </div>

        <div class="table-container">
            <table class="matrix-table">
                <thead>
                    <tr>
                        <th>Monday</th>
                        <th>Tuesday</th>
                        <th>Wednesday</th>
                        <th>Thursday</th>
                        <th>Friday</th>
                        <th>Saturday</th>
                        <th>Sunday</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><select class="cell-select day-input" data-day="Monday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Tuesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Wednesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Thursday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Friday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Saturday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Sunday" onchange="refreshCellClass(this)"></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <label>Observations & Notes</label>
        <textarea id="matrix-notes" rows="2" placeholder="Add optional details..."></textarea>

        <div style="display:flex; justify-content: space-between;">
            <button class="btn-action" onclick="backToStep1()">Back</button>
            <button class="btn-action btn-primary" onclick="commitSchedule()">Save Assignment</button>
        </div>
    </div>

    <!-- ESCENA 3: ÉXITO -->
    <div id="step-3" class="view-layer" style="text-align:center; padding: 40px 0;">
        <h3 style="font-family: var(--font-serif); font-size: 30px; margin-bottom: 10px; font-weight: 400;">Changes Recorded</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">The data has been gracefully stored in the system memory.</p>
        <button class="btn-action btn-primary" onclick="resetFlow()">Next Record</button>
    </div>
</div>

<!-- MÓDULO DE GESTIÓN ADMINISTRATIVA -->
<div class="management-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-family: var(--font-serif); font-size: 20px; color: var(--olive-deep);">Staff Management Console</div>
        <button class="btn-action" style="padding: 6px 16px; font-size: 11px;" onclick="toggleMgmtPanel()">Unlock Console</button>
    </div>

    <div id="mgmt-panel-content" class="mgmt-grid" style="display:none;">
        <!-- AGREGAR -->
        <div class="sub-panel">
            <div class="mgmt-title">Add Profile</div>
            <input type="text" id="add-name" placeholder="Full Name">
            <select id="add-dept">
                <option value="Customer Service">Customer Service</option>
                <option value="Deposits">Deposits</option>
                <option value="Payouts">Payouts</option>
            </select>
            <button class="btn-action btn-primary" style="width:100%;" onclick="executeAddMember()">Register Member</button>
        </div>

        <!-- TRANSLADAR -->
        <div class="sub-panel">
            <div class="mgmt-title">Transfer Hub</div>
            <select id="transfer-agent-select"><option value="">Select Member...</option></select>
            <select id="transfer-new-dept">
                <option value="Customer Service">Customer Service</option>
                <option value="Deposits">Deposits</option>
                <option value="Payouts">Payouts</option>
            </select>
            <button class="btn-action" style="width:100%;" onclick="executeTransfer()">Apply Transfer</button>
        </div>

        <!-- REMOVER -->
        <div class="sub-panel">
            <div class="mgmt-title" style="color: var(--st-off-color);">Remove Entry</div>
            <select id="delete-agent-select"><option value="">Select Member...</option></select>
            <button class="btn-action" style="width:100%; background: transparent; border-color: var(--st-off-color); color: var(--st-off-color);" onclick="executeDeleteMember()">Delete Permanently</button>
        </div>
    </div>
</div>

<script>
    const defaultTeam = {
        "Customer Service": [
            "Cristopher Sandoval", "Kendra Temple", "María José Fallas", "Natalia Sibaja", "Pablo Retana", 
            "Victor Ramírez", "Luis Carvajal", "Kendall Montoya", "Josué Vargas", "Kevin Salazar", 
            "Israel Aburto", "Vanessa Umana", "Naigell Beckford", "Nicole Román", "Mariana Varela", 
            "Tamara Donaire", "Eckart Lutz", "Isaac Porras", "Michelle Saborio", "Emerson Hernandez", 
            "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", "Elena Rojas", "Elliot Navarro", 
            "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros", "Andrey Castillo", "Rory Bulgarelli", 
            "Phillip Desanti", "Eddison Prendas", "Naomy Sanchez ", "Adrian Navarro", "Carlos Alejandro Amador Luna", 
            "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Carolina Castro", 
            "Daniel Leandro Rojas", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Luis Fernando Ruiz", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Deposits": ["Mariana Bejarano", "Cristopher Sandoval", "Eddison Prendas", "Diego Matamoros"],
        "Payouts": ["Carlos Amador", "Fer Blanco", "Graciela Bravo ", "Ignacio Blanco", "Kevin Zamora", "Samuel Carballo", "Sheydron Clark", "Sebastian Rivera", "Silvana Suarez"]
    };

    if (!localStorage.getItem('panda_staff_db')) {
        localStorage.setItem('panda_staff_db', JSON.stringify(defaultTeam));
    }

    let currentAgent = "";
    let mgmtUnlocked = false;

    function getStaffData() { return JSON.parse(localStorage.getItem('panda_staff_db')); }

    function saveStaffData(data) {
        localStorage.setItem('panda_staff_db', JSON.stringify(data));
        loadStaffMesh();
        populateMgmtDropdowns();
    }

    function toggleMgmtPanel() {
        if (!mgmtUnlocked) {
            const pass = prompt("Enter Supervisor Password:");
            if (pass !== "Sups2019") { alert("Access Denied."); return; }
            mgmtUnlocked = true;
        }
        const panel = document.getElementById('mgmt-panel-content');
        panel.style.display = panel.style.display === 'none' ? 'grid' : 'none';
        populateMgmtDropdowns();
    }

    function loadStaffMesh() {
        const dept = document.getElementById('department').value;
        const wrapper = document.getElementById('mesh-wrapper');
        const mesh = document.getElementById('staff-mesh');
        mesh.innerHTML = '';
        currentAgent = "";

        if (!dept) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = 'block';

        getStaffData()[dept].forEach(name => {
            const item = document.createElement('div');
            item.className = 'mesh-item';
            item.textContent = name;
            item.onclick = () => {
                document.querySelectorAll('.mesh-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentAgent = name;
            };
            mesh.appendChild(item);
        });
    }

    function goToMatrix() {
        if (!currentAgent) { alert("Select a team member first."); return; }
        document.getElementById('step-1').classList.remove('active');
        document.getElementById('step-2').classList.add('active');
        document.getElementById('active-agent-title').textContent = currentAgent;
        buildMatrixOptions();
    }

    function buildMatrixOptions() {
        const rules = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const noWeekendOff = ["Keisha Cross Brown", ...rules];

        const isRestricted = rules.includes(currentAgent);
        const blockWeekendOff = noWeekendOff.includes(currentAgent);

        document.querySelectorAll('.day-input').forEach(select => {
            const day = select.getAttribute('data-day');
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let html = '';

            if (isRestricted) {
                html += `
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                `;
            } else {
                html += `
                    <option value="06:00 - 14:00">06:00 - 14:00</option>
                    <option value="07:00 - 15:00">07:00 - 15:00</option>
                    <option value="08:00 - 16:00">08:00 - 16:00</option>
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="12:00 - 20:00">12:00 - 20:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                    <option value="14:00 - 22:00">14:00 - 22:00</option>
                    <option value="15:00 - 23:00">15:00 - 23:00</option>
                `;
            }

            html += `<option value="OPEN">OPEN</option>`;
            html += `<option value="Vacaciones">Vacaciones</option>`;

            if (!(isWeekend && blockWeekendOff)) {
                html += `<option value="Day Off">Day Off</option>`;
            }

            select.innerHTML = html;
            refreshCellClass(select);
        });
    }

    function refreshCellClass(elem) {
        elem.classList.remove('st-active', 'st-off', 'st-vacation', 'st-open');
        if (elem.value === "Day Off") elem.classList.add('st-off');
        else if (elem.value === "Vacaciones") elem.classList.add('st-vacation');
        else if (elem.value === "OPEN") elem.classList.add('st-open');
        else elem.classList.add('st-active');
    }

    function backToStep1() {
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
    }

    function commitSchedule() {
        const dept = document.getElementById('department').value;
        const notes = document.getElementById('matrix-notes').value || "None";
        const targetDays = {};

        document.querySelectorAll('.day-input').forEach(sel => {
            targetDays[sel.getAttribute('data-day')] = sel.value;
        });

        let masterRoster = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        masterRoster = masterRoster.filter(r => r.name !== currentAgent);

        masterRoster.push({
            name: currentAgent,
            dept: dept,
            selections: targetDays,
            notes: notes,
            timestamp: new Date().toISOString()
        });

        localStorage.setItem('panda_master_roster', JSON.stringify(masterRoster));
        
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-3').classList.add('active');
    }

    function resetFlow() {
        document.getElementById('matrix-notes').value = "";
        document.getElementById('step-3').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
        loadStaffMesh();
    }

    function populateMgmtDropdowns() {
        const db = getStaffData();
        const transSel = document.getElementById('transfer-agent-select');
        const delSel = document.getElementById('delete-agent-select');

        transSel.innerHTML = '<option value="">Select Member...</option>';
        delSel.innerHTML = '<option value="">Select Member...</option>';

        Object.keys(db).forEach(dept => {
            db[dept].forEach(name => {
                const innerText = `${name} (${dept})`;
                const valueString = JSON.stringify({name, dept});
                
                transSel.appendChild(new Option(innerText, valueString));
                delSel.appendChild(new Option(innerText, valueString));
            });
        });
    }

    function executeAddMember() {
        const name = document.getElementById('add-name').value.trim();
        const dept = document.getElementById('add-dept').value;
        if(!name) return alert("Please specify a name.");
        
        const db = getStaffData();
        if(db[dept].includes(name)) return alert("Member already exists.");

        db[dept].push(name); db[dept].sort();
        saveStaffData(db);
        document.getElementById('add-name').value = "";
        alert("Member added.");
    }

    function executeTransfer() {
        const targetRaw = document.getElementById('transfer-agent-select').value;
        const newDept = document.getElementById('transfer-new-dept').value;
        if(!targetRaw) return alert("Select a member first.");

        const target = JSON.parse(targetRaw);
        if(target.dept === newDept) return alert("Member is already in that department.");

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        db[newDept].push(target.name); db[newDept].sort();
        saveStaffData(db);
        alert("Department updated successfully.");
    }

    function executeDeleteMember() {
        const targetRaw = document.getElementById('delete-agent-select').value;
        if(!targetRaw) return alert("Select a member first.");
        
        const target = JSON.parse(targetRaw);
        if(!confirm(`Are you sure you want to remove ${target.name}?`)) return;

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        saveStaffData(db);
        alert("Member removed.");
    }

    async function triggerExcelExport() {
        const auth = prompt("Admin Key Verification:");
        if (auth !== "Sups2019") return alert("Unauthorized.");

        const master = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        if(!master.length) return alert("No active logs to export.");

        const wb = new ExcelJS.Workbook();
        ["Customer Service", "Deposits", "Payouts"].forEach(dKey => {
            const list = master.filter(m => m.dept === dKey);
            if(!list.length) return;

            const ws = wb.addWorksheet(dKey);
            ws.columns = [
                { header: 'Agent Name', key: 'name', width: 26 },
                { header: 'Monday', key: 'Monday', width: 16 },
                { header: 'Tuesday', key: 'Tuesday', width: 16 },
                { header: 'Wednesday', key: 'Wednesday', width: 16 },
                { header: 'Thursday', key: 'Thursday', width: 16 },
                { header: 'Friday', key: 'Friday', width: 16 },
                { header: 'Saturday', key: 'Saturday', width: 16 },
                { header: 'Sunday', key: 'Sunday', width: 16 },
                { header: 'Notes', key: 'notes', width: 30 }
            ];

            const hr = ws.getRow(1); hr.height = 28;
            hr.font = { bold: true, color: { argb: 'FFFFFF' }, name: 'Segoe UI' };
            hr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '4A532B' } };
            hr.alignment = { vertical: 'middle', horizontal: 'center' };

            list.forEach(entry => {
                const dataRow = { name: entry.name, notes: entry.notes, ...entry.selections };
                const row = ws.addRow(dataRow); row.height = 24;
                row.getCell('name').font = { bold: true, name: 'Segoe UI' };
                row.getCell('name').alignment = { vertical: 'middle' };

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(day => {
                    const cell = row.getCell(day);
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.font = { name: 'Segoe UI', bold: false, size: 10 };

                    let bg = "F4F2ED"; let fg = "1E2315";
                    if(dataRow[day] === "Day Off") { bg = "F3ECEB"; fg = "A96151"; }
                    else if(dataRow[day] === "Vacaciones") { bg = "F5EFE3"; fg = "C49A45"; }
                    else if(dataRow[day] === "OPEN") { bg = "EBF0EA"; fg = "6E8467"; }

                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bg } };
                    cell.font.color = { argb: 'FF' + fg };
                });
            });
        });

        const buf = await wb.xlsx.writeBuffer();
        const b = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `Panda_Editorial_Roster.xlsx`;
        a.click();
    }
</script>
</body>
</html>
