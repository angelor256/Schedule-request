<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Dynasty — Hub de Horarios</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-main: #090d16;
            --card-bg: rgba(19, 26, 42, 0.65);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-main: #f3f4f6;
            --text-muted: #64748b;
            --accent-mint: #00f2fe;
            --accent-purple: #7c3aed;
            --accent-danger: #ef4444;
            --accent-vacation: #f59e0b;
            --sans: 'Plus Jakarta Sans', sans-serif;
            --display: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--sans);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 25px;
            margin-bottom: 35px;
        }

        .brand-title {
            font-family: var(--display);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-action:hover {
            background: var(--text-main);
            color: var(--bg-main);
            transform: translateY(-1px);
        }
        .btn-primary {
            background: var(--text-main);
            color: var(--bg-main);
        }
        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.85);
        }

        .view-layer { display: none; }
        .view-layer.active { display: block; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 700;
        }

        select, textarea, input {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-subtle);
            padding: 14px 18px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
            margin-bottom: 25px;
        }
        select:focus, input:focus { border-color: var(--text-muted); }

        .mesh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 30px;
        }
        .mesh-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            padding: 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .mesh-item:hover {
            border-color: rgba(255,255,255,0.15);
            color: #fff;
        }
        .mesh-item.selected {
            background: rgba(255,255,255,0.08);
            border-color: #fff;
            color: #fff;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            background: rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
        }
        .matrix-table th {
            padding: 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-subtle);
            text-align: left;
        }
        .matrix-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .cell-select {
            width: 100%;
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            margin-bottom: 0;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
        }
        .cell-select.st-active { border-color: var(--text-muted); color: #fff; }
        .cell-select.st-off { border-color: rgba(239,68,68,0.2); color: #ef4444; }
        .cell-select.st-vacation { border-color: rgba(245,158,11,0.3); color: #f59e0b; }
        .cell-select.st-open { border-color: rgba(0,242,254,0.3); color: #00f2fe; }

        /* MÓDULO DE GESTIÓN CRUCIAL */
        .management-card {
            width: 100%;
            max-width: 1200px;
            background: rgba(10, 14, 23, 0.4);
            border: 1px dashed var(--border-subtle);
            border-radius: 20px;
            padding: 30px;
        }
        .mgmt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .sub-panel {
            background: rgba(0,0,0,0.15);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
        }
        .mgmt-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-area">
        <div class="brand-title">Panda Roster Module</div>
        <button class="btn-action" onclick="triggerExcelExport()">Export Master</button>
    </div>

    <!-- PASO 1: SELECCIÓN -->
    <div id="step-1" class="view-layer active">
        <label>Operational Hub</label>
        <select id="department" onchange="loadStaffMesh()">
            <option value="">Select a Hub...</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Deposits">Deposits</option>
            <option value="Payouts">Payouts</option>
        </select>

        <div id="mesh-wrapper" style="display:none;">
            <label>Team Member Identity</label>
            <div class="mesh-grid" id="staff-mesh"></div>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <button class="btn-action btn-primary" onclick="goToMatrix()">Configure Schedule</button>
        </div>
    </div>

    <!-- PASO 2: MATRIZ HORIZONTAL -->
    <div id="step-2" class="view-layer">
        <div style="margin-bottom: 20px;">
            <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Active Profile:</span>
            <span id="active-agent-title" style="font-size: 18px; font-weight: 700; margin-left: 8px; font-family: var(--display);">---</span>
        </div>

        <div class="table-container">
            <table class="matrix-table">
                <thead>
                    <tr>
                        <th>Monday</th>
                        <th>Tuesday</th>
                        <th>Wednesday</th>
                        <th>Thursday</th>
                        <th>Friday</th>
                        <th>Saturday</th>
                        <th>Sunday</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><select class="cell-select day-input" data-day="Monday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Tuesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Wednesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Thursday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Friday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Saturday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-select day-input" data-day="Sunday" onchange="refreshCellClass(this)"></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <label>Shift Comments / Adjustments</label>
        <textarea id="matrix-notes" rows="2" placeholder="Add specific notes if necessary..."></textarea>

        <div style="display:flex; justify-content: space-between;">
            <button class="btn-action" onclick="backToStep1()">Back</button>
            <button class="btn-action btn-primary" onclick="commitSchedule()">Commit Data</button>
        </div>
    </div>

    <!-- PASO 3: ARCHIVADO -->
    <div id="step-3" class="view-layer" style="text-align:center; padding: 40px 0;">
        <h3 style="font-family: var(--display); font-size: 22px; margin-bottom: 10px;">Data Saved</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">The selection was successfully stored locally.</p>
        <button class="btn-action btn-primary" onclick="resetFlow()">Next Record</button>
    </div>
</div>

<!-- MÓDULO DE GESTIÓN AVANZADA DE PERSONAL -->
<div class="management-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-family: var(--display); font-size: 16px; font-weight:700;">Staff Management Console</div>
        <button class="btn-action" style="padding: 6px 14px; font-size:11px;" onclick="toggleMgmtPanel()">Unlock Console</button>
    </div>

    <div id="mgmt-panel-content" class="mgmt-grid" style="display:none;">
        <!-- AGREGAR -->
        <div class="sub-panel">
            <div class="mgmt-title">➕ Add New Staff</div>
            <input type="text" id="add-name" placeholder="Full Name">
            <select id="add-dept">
                <option value="Customer Service">Customer Service</option>
                <option value="Deposits">Deposits</option>
                <option value="Payouts">Payouts</option>
            </select>
            <button class="btn-action btn-primary" style="width:100%;" onclick="executeAddMember()">Register Member</button>
        </div>

        <!-- CAMBIAR DE DEPARTAMENTO -->
        <div class="sub-panel">
            <div class="mgmt-title">🔄 Transfer Department</div>
            <select id="transfer-agent-select">
                <option value="">Select Target...</option>
            </select>
            <select id="transfer-new-dept">
                <option value="Customer Service">Customer Service</option>
                <option value="Deposits">Deposits</option>
                <option value="Payouts">Payouts</option>
            </select>
            <button class="btn-action" style="width:100%;" onclick="executeTransfer()">Transfer Location</button>
        </div>

        <!-- BORRAR -->
        <div class="sub-panel">
            <div class="mgmt-title" style="color: var(--accent-danger);">❌ Remove Staff Member</div>
            <select id="delete-agent-select">
                <option value="">Select Target...</option>
            </select>
            <button class="btn-action" style="width:100%; background: rgba(239,68,68,0.1); border-color: var(--accent-danger); color: var(--accent-danger);" onclick="executeDeleteMember()">Terminate Entry</button>
        </div>
    </div>
</div>

<script>
    // Inicialización de datos base si no existen en localStorage
    const defaultTeam = {
        "Customer Service": [
            "Cristopher Sandoval", "Kendra Temple", "María José Fallas", "Natalia Sibaja", "Pablo Retana", 
            "Victor Ramírez", "Luis Carvajal", "Kendall Montoya", "Josué Vargas", "Kevin Salazar", 
            "Israel Aburto", "Vanessa Umana", "Naigell Beckford", "Nicole Román", "Mariana Varela", 
            "Tamara Donaire", "Eckart Lutz", "Isaac Porras", "Michelle Saborio", "Emerson Hernandez", 
            "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", "Elena Rojas", "Elliot Navarro", 
            "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros", "Andrey Castillo", "Rory Bulgarelli", 
            "Phillip Desanti", "Eddison Prendas", "Naomy Sanchez ", "Adrian Navarro", "Carlos Alejandro Amador Luna", 
            "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Carolina Castro", 
            "Daniel Leandro Rojas", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Luis Fernando Ruiz", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Deposits": ["Mariana Bejarano", "Cristopher Sandoval", "Eddison Prendas", "Diego Matamoros"],
        "Payouts": ["Carlos Amador", "Fer Blanco", "Graciela Bravo ", "Ignacio Blanco", "Kevin Zamora", "Samuel Carballo", "Sheydron Clark", "Sebastian Rivera", "Silvana Suarez"]
    };

    if (!localStorage.getItem('panda_staff_db')) {
        localStorage.setItem('panda_staff_db', JSON.stringify(defaultTeam));
    }

    let currentAgent = "";
    let mgmtUnlocked = false;

    function getStaffData() {
        return JSON.parse(localStorage.getItem('panda_staff_db'));
    }

    function saveStaffData(data) {
        localStorage.setItem('panda_staff_db', JSON.stringify(data));
        loadStaffMesh();
        populateMgmtDropdowns();
    }

    function toggleMgmtPanel() {
        if (!mgmtUnlocked) {
            const pass = prompt("Enter Supervisor Access Password:");
            if (pass !== "Sups2019") {
                alert("Unauthorized Entry.");
                return;
            }
            mgmtUnlocked = true;
        }
        const panel = document.getElementById('mgmt-panel-content');
        panel.style.display = panel.style.display === 'none' ? 'grid' : 'none';
        populateMgmtDropdowns();
    }

    function loadStaffMesh() {
        const dept = document.getElementById('department').value;
        const wrapper = document.getElementById('mesh-wrapper');
        const mesh = document.getElementById('staff-mesh');
        
        mesh.innerHTML = '';
        currentAgent = "";

        if (!dept) {
            wrapper.style.display = 'none';
            return;
        }

        wrapper.style.display = 'block';
        const db = getStaffData();

        db[dept].forEach(name => {
            const item = document.createElement('div');
            item.className = 'mesh-item';
            item.textContent = name;
            item.onclick = () => {
                document.querySelectorAll('.mesh-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentAgent = name;
            };
            mesh.appendChild(item);
        });
    }

    function goToMatrix() {
        if (!currentAgent) {
            alert("Please identify a staff profile first.");
            return;
        }
        document.getElementById('step-1').classList.remove('active');
        document.getElementById('step-2').classList.add('active');
        
        document.getElementById('active-agent-title').textContent = currentAgent;
        buildMatrixOptions();
    }

    function buildMatrixOptions() {
        const structuralRuleList = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const standardAgentsNoWeekendOff = ["Keisha Cross Brown"];

        const hasRestrictedHours = structuralRuleList.includes(currentAgent);
        const denyWeekendOff = hasRestrictedHours || standardAgentsNoWeekendOff.includes(currentAgent);

        const selects = document.querySelectorAll('.day-input');

        selects.forEach(select => {
            const day = select.getAttribute('data-day');
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let html = '';

            if (hasRestrictedHours) {
                html += `
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                `;
            } else {
                html += `
                    <option value="06:00 - 14:00">06:00 - 14:00</option>
                    <option value="07:00 - 15:00">07:00 - 15:00</option>
                    <option value="08:00 - 16:00">08:00 - 16:00</option>
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="12:00 - 20:00">12:00 - 20:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                    <option value="14:00 - 22:00">14:00 - 22:00</option>
                    <option value="15:00 - 23:00">15:00 - 23:00</option>
                `;
            }

            // Opciones de estados universales agregados
            html += `<option value="OPEN">✨ OPEN</option>`;
            html += `<option value="Vacaciones">🌴 Vacaciones</option>`;

            if (!(isWeekend && denyWeekendOff)) {
                html += `<option value="Day Off">🛑 Day Off</option>`;
            }

            select.innerHTML = html;
            refreshCellClass(select);
        });
    }

    function refreshCellClass(elem) {
        elem.classList.remove('st-active', 'st-off', 'st-vacation', 'st-open');
        if (elem.value === "Day Off") elem.classList.add('st-off');
        else if (elem.value === "Vacaciones") elem.classList.add('st-vacation');
        else if (elem.value === "OPEN") elem.classList.add('st-open');
        else elem.classList.add('st-active');
    }

    function backToStep1() {
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
    }

    function commitSchedule() {
        const dept = document.getElementById('department').value;
        const notes = document.getElementById('matrix-notes').value || "None";
        const targetDays = {};

        document.querySelectorAll('.day-input').forEach(sel => {
            targetDays[sel.getAttribute('data-day')] = sel.value;
        });

        let masterRoster = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        masterRoster = masterRoster.filter(r => r.name !== currentAgent);

        masterRoster.push({
            name: currentAgent,
            dept: dept,
            selections: targetDays,
            notes: notes,
            timestamp: new Date().toISOString()
        });

        localStorage.setItem('panda_master_roster', JSON.stringify(masterRoster));
        
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-3').classList.add('active');
    }

    function resetFlow() {
        document.getElementById('matrix-notes').value = "";
        document.getElementById('step-3').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
        loadStaffMesh();
    }

    /* LÓGICA INTERNA DE GESTIÓN (CRUD) */
    function populateMgmtDropdowns() {
        const db = getStaffData();
        const transferSelect = document.getElementById('transfer-agent-select');
        const deleteSelect = document.getElementById('delete-agent-select');

        transferSelect.innerHTML = '<option value="">Select Target...</option>';
        deleteSelect.innerHTML = '<option value="">Select Target...</option>';

        Object.keys(db).forEach(dept => {
            db[dept].forEach(name => {
                const opt1 = document.createElement('option');
                opt1.value = JSON.stringify({name, dept});
                opt1.textContent = `${name} (${dept})`;
                transferSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = JSON.stringify({name, dept});
                opt2.textContent = `${name} (${dept})`;
                deleteSelect.appendChild(opt2);
            });
        });
    }

    function executeAddMember() {
        const name = document.getElementById('add-name').value.trim();
        const dept = document.getElementById('add-dept').value;

        if(!name) { alert("Please provide a valid structural name."); return; }
        
        const db = getStaffData();
        if(db[dept].includes(name)) { alert("This corporate entry already exists."); return; }

        db[dept].push(name);
        db[dept].sort();
        saveStaffData(db);
        
        document.getElementById('add-name').value = "";
        alert(`${name} registered successfully into ${dept}.`);
    }

    function executeTransfer() {
        const targetRaw = document.getElementById('transfer-agent-select').value;
        const newDept = document.getElementById('transfer-new-dept').value;

        if(!targetRaw) { alert("Identify target entry first."); return; }
        const target = JSON.parse(targetRaw);

        if(target.dept === newDept) { alert("Agent already belongs to this department."); return; }

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        db[newDept].push(target.name);
        db[newDept].sort();

        saveStaffData(db);
        alert(`Transferred ${target.name} to ${newDept}.`);
    }

    function executeDeleteMember() {
        const targetRaw = document.getElementById('delete-agent-select').value;
        if(!targetRaw) { alert("Identify execution target first."); return; }
        
        const target = JSON.parse(targetRaw);
        if(!confirm(`Confirm terminal removal of ${target.name}?`)) return;

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);

        saveStaffData(db);
        alert(`Removed ${target.name} from records.`);
    }

    /* PROCESAMIENTO EXCELJS */
    async function triggerExcelExport() {
        const auth = prompt("Enter Administrative Verification Code:");
        if (auth !== "Sups2019") { alert("Access Denied."); return; }

        const master = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        if(!master.length) { alert("No stored logs found."); return; }

        const wb = new ExcelJS.Workbook();
        const departments = ["Customer Service", "Deposits", "Payouts"];

        departments.forEach(dKey => {
            const list = master.filter(m => m.dept === dKey);
            if(!list.length) return;

            const ws = wb.addWorksheet(dKey);
            ws.columns = [
                { header: 'Agent Name', key: 'name', width: 28 },
                { header: 'Monday', key: 'Monday', width: 18 },
                { header: 'Tuesday', key: 'Tuesday', width: 18 },
                { header: 'Wednesday', key: 'Wednesday', width: 18 },
                { header: 'Thursday', key: 'Thursday', width: 18 },
                { header: 'Friday', key: 'Friday', width: 18 },
                { header: 'Saturday', key: 'Saturday', width: 18 },
                { header: 'Sunday', key: 'Sunday', width: 18 },
                { header: 'Operational Comments', key: 'notes', width: 35 }
            ];

            const headerRow = ws.getRow(1);
            headerRow.height = 26;
            headerRow.font = { name: 'Segoe UI', bold: true, color: { argb: 'FFFFFF' } };
            headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '1E293B' } };
            headerRow.alignment = { vertical: 'middle', horizontal: 'center' };

            list.forEach(entry => {
                const dataRow = {
                    name: entry.name,
                    notes: entry.notes,
                    ...entry.selections
                };

                const row = ws.addRow(dataRow);
                row.height = 24;

                row.getCell('name').font = { bold: true, name: 'Segoe UI' };
                row.getCell('name').alignment = { vertical: 'middle' };
                row.getCell('notes').alignment = { vertical: 'middle' };

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(day => {
                    const cell = row.getCell(day);
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.font = { name: 'Segoe UI', bold: true, size: 10 };

                    let bg = "F1F5F9"; let fg = "334155";
                    if(dataRow[day] === "Day Off") { bg = "FEE2E2"; fg = "991B1B"; }
                    else if(dataRow[day] === "Vacaciones") { bg = "FEF3C7"; fg = "92400E"; }
                    else if(dataRow[day] === "OPEN") { bg = "E0F2FE"; fg = "075985"; }

                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bg } };
                    cell.font.color = { argb: 'FF' + fg };
                });
            });
        });

        const buf = await wb.xlsx.writeBuffer();
        const b = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `Panda_Master_Roster.xlsx`;
        a.click();
    }
</script>
</body>
</html>
