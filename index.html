<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Innovation Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1e221b 0%, #0d0f0c 100%);
            --glass-card: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-border-glow: rgba(163, 184, 150, 0.3);
            
            --accent-glow: #a3b896; /* Verde musgo luminoso sutil */
            --text-main: #f0f2ee;
            --text-muted: #8a9286;
            
            /* Estados líquidos */
            --st-off-bg: rgba(230, 100, 100, 0.1);
            --st-off-border: rgba(230, 100, 100, 0.3);
            --st-off-text: #ff8888;
            
            --st-vac-bg: rgba(230, 180, 80, 0.1);
            --st-vac-border: rgba(230, 180, 80, 0.3);
            --st-vac-text: #ffd075;
            
            --st-open-bg: rgba(100, 210, 140, 0.1);
            --st-open-border: rgba(100, 210, 140, 0.3);
            --st-open-text: #8bf0b2;

            --font: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Contenedor Flotante de Cristal */
        .glass-container {
            width: 100%;
            max-width: 1150px;
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
            position: relative;
        }

        .glass-container::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border-glow), transparent);
        }

        .header-workspace {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 30px;
            margin-bottom: 45px;
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Botones Fluídos */
        .btn-fluid {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 28px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-fluid:hover {
            background: #ffffff;
            color: #0d0f0c;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .btn-glow {
            background: var(--accent-glow);
            color: #0d0f0c;
            border: none;
        }
        .btn-glow:hover {
            background: #ffffff;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .step-layer { display: none; }
        .step-layer.active { display: block; animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 14px;
            font-weight: 600;
        }

        select, textarea, input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: all 0.25s ease;
            margin-bottom: 35px;
        }
        select:focus, input:focus, textarea:focus { 
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(163, 184, 150, 0.15);
        }

        /* Cuadrícula Líquida de Agentes */
        .liquid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 14px;
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 40px;
            padding-right: 8px;
        }
        .liquid-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 18px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 14px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .liquid-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }
        .liquid-item.selected {
            background: rgba(163, 184, 150, 0.15);
            border-color: var(--accent-glow);
            color: #ffffff;
            box-shadow: inset 0 0 15px rgba(163, 184, 150, 0.2);
        }

        /* Matriz de Turnos Cinematográfica */
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 40px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.1);
        }
        .liquid-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        .liquid-table th {
            background: rgba(255, 255, 255, 0.01);
            padding: 18px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--glass-border);
            text-align: left;
        }
        .liquid-table td {
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Selectores de Celda Inteligentes */
        .matrix-select {
            width: 100%;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            margin-bottom: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .matrix-select:focus {
            box-shadow: none;
        }
        .matrix-select.st-active { 
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }
        .matrix-select.st-off { 
            color: var(--st-off-text); 
            background: var(--st-off-bg);
            border-color: var(--st-off-border);
        }
        .matrix-select.st-vacation { 
            color: var(--st-vac-text); 
            background: var(--st-vac-bg);
            border-color: var(--st-vac-border);
        }
        .matrix-select.st-open { 
            color: var(--st-open-text); 
            background: var(--st-open-bg);
            border-color: var(--st-open-border);
        }

        /* Consola de Control de Grupos (Admin) */
        .panel-admin {
            width: 100%;
            max-width: 1150px;
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 50px;
        }
        .admin-flex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 30px;
            margin-top: 35px;
        }
        .admin-box {
            background: rgba(0, 0, 0, 0.15);
            padding: 26px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }
        .admin-box-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 22px;
            color: var(--accent-glow);
        }

        /* Scroll Custom */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header-workspace">
        <div class="brand-logo">WFM // Streamline.io</div>
        <button class="btn-fluid" onclick="triggerExcelExport()">Export Matrix</button>
    </div>

    <!-- NAVEGACIÓN PASO 1: SELECCIÓN -->
    <div id="step-1" class="step-layer active">
        <label>Operational Cluster</label>
        <select id="department" onchange="loadStaffMesh()">
            <option value="">Select Target Cluster...</option>
            <option value="Calculo Phones">Calculo Phones</option>
            <option value="Calculo Chats">Calculo Chats</option>
            <option value="Calculo Processing Squad">Calculo Processing Squad</option>
        </select>

        <div id="mesh-wrapper" style="display:none;">
            <label>Cluster Directory</label>
            <div class="liquid-grid" id="staff-mesh"></div>
        </div>

        <div style="text-align: right; margin-top: 10px;">
            <button class="btn-fluid btn-glow" onclick="goToMatrix()">Initialize Editor</button>
        </div>
    </div>

    <!-- NAVEGACIÓN PASO 2: ASIGNACIONES -->
    <div id="step-2" class="step-layer">
        <div style="margin-bottom: 35px;">
            <span style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Target Node</span>
            <div id="active-agent-title" style="font-size: 26px; font-weight: 700; margin-top: 4px;">---</div>
        </div>

        <div class="table-wrap">
            <table class="liquid-table">
                <thead>
                    <tr>
                        <th>Monday</th>
                        <th>Tuesday</th>
                        <th>Wednesday</th>
                        <th>Thursday</th>
                        <th>Friday</th>
                        <th>Saturday</th>
                        <th>Sunday</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><select class="matrix-select day-input" data-day="Monday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="matrix-select day-input" data-day="Tuesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="matrix-select day-input" data-day="Wednesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="matrix-select day-input" data-day="Thursday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="matrix-select day-input" data-day="Friday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="matrix-select day-input" data-day="Saturday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="matrix-select day-input" data-day="Sunday" onchange="refreshCellClass(this)"></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <label>Node Remarks</label>
        <textarea id="matrix-notes" rows="2" placeholder="Input operational anomalies..."></textarea>

        <div style="display:flex; justify-content: space-between;">
            <button class="btn-fluid" onclick="backToStep1()">Return</button>
            <button class="btn-fluid btn-glow" onclick="commitSchedule()">Commit Matrix</button>
        </div>
    </div>

    <!-- NAVEGACIÓN PASO 3: ARCHIVADO -->
    <div id="step-3" class="step-layer" style="text-align:center; padding: 40px 0;">
        <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 10px;">Pipeline Synced</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">The localized parameters have integrated with the active session block.</p>
        <button class="btn-fluid btn-glow" onclick="resetFlow()">Next Node</button>
    </div>
</div>

<!-- CONSOLA DE GESTIÓN DE ROSTER -->
<div class="panel-admin">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Roster Core Registry</div>
        <button class="btn-fluid" style="padding: 8px 20px; font-size: 11px;" onclick="toggleMgmtPanel()">Unlock Registry</button>
    </div>

    <div id="mgmt-panel-content" class="admin-flex-grid" style="display:none;">
        <!-- AGREGAR -->
        <div class="admin-box">
            <div class="admin-box-title">Deploy New Asset</div>
            <input type="text" id="add-name" placeholder="Full Legal Name">
            <select id="add-dept">
                <option value="Calculo Phones">Calculo Phones</option>
                <option value="Calculo Chats">Calculo Chats</option>
                <option value="Calculo Processing Squad">Calculo Processing Squad</option>
            </select>
            <button class="btn-fluid btn-glow" style="width:100%;" onclick="executeAddMember()">Deploy Asset</button>
        </div>

        <!-- TRANSLADAR -->
        <div class="admin-box">
            <div class="admin-box-title">Cluster Re-Allocation</div>
            <select id="transfer-agent-select"><option value="">Select Asset...</option></select>
            <select id="transfer-new-dept">
                <option value="Calculo Phones">Calculo Phones</option>
                <option value="Calculo Chats">Calculo Chats</option>
                <option value="Calculo Processing Squad">Calculo Processing Squad</option>
            </select>
            <button class="btn-fluid" style="width:100%;" onclick="executeTransfer()">Transfer Asset</button>
        </div>

        <!-- QUITAR -->
        <div class="admin-box">
            <div class="admin-box-title" style="color: var(--st-off-text);">Purge Core Log</div>
            <select id="delete-agent-select"><option value="">Select Asset...</option></select>
            <button class="btn-fluid" style="width:100%; border-color: var(--st-off-border); color: var(--st-off-text);" onclick="executeDeleteMember()">Purge Asset</button>
        </div>
    </div>
</div>

<script>
    // LISTAS EXTRAÍDAS COMPLETAMENTE DE "Schedule Draft - CS (1).xlsx"
    const defaultTeam = {
        "Calculo Phones": [
            "Emerson Hernandez", "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", 
            "Andrey Castillo", "Rory Bulgarelli", "Phillip Desanti", "Eddison Prendas", 
            "Carlos Alejandro Amador Luna", "Carlos Ortiz", "David Vogler", "Valerie Alfaro", 
            "Jose Maria Cartin Peralta", "Samuel Carballo", "Luis Fernando Ruiz"
        ],
        "Calculo Chats": [
            "Elena Rojas", "Elliot Navarro", "Julian Mena", "Sebastian Puerta", 
            "Maria Jose Quiros Quiros", "Naomy Sanchez", "Adrian Navarro", "Diego Matamoros", 
            "Carolina Castro", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Sheydron Clark", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Calculo Processing Squad": [
            "Carlos Amador", "Fer Blanco", "Graciela Bravo", "Ignacio Blanco", 
            "Kevin Zamora", "Sebastian Rivera", "Silvana Suarez"
        ]
    };

    if (!localStorage.getItem('panda_staff_db')) {
        localStorage.setItem('panda_staff_db', JSON.stringify(defaultTeam));
    }

    let currentAgent = "";
    let mgmtUnlocked = false;

    function getStaffData() { return JSON.parse(localStorage.getItem('panda_staff_db')); }

    function saveStaffData(data) {
        localStorage.setItem('panda_staff_db', JSON.stringify(data));
        loadStaffMesh();
        populateMgmtDropdowns();
    }

    function toggleMgmtPanel() {
        if (!mgmtUnlocked) {
            const pass = prompt("Credentials Check:");
            if (pass !== "Sups2019") { alert("Failed Security Protocol."); return; }
            mgmtUnlocked = true;
        }
        const panel = document.getElementById('mgmt-panel-content');
        panel.style.display = panel.style.display === 'none' ? 'grid' : 'none';
        populateMgmtDropdowns();
    }

    function loadStaffMesh() {
        const dept = document.getElementById('department').value;
        const wrapper = document.getElementById('mesh-wrapper');
        const mesh = document.getElementById('staff-mesh');
        mesh.innerHTML = '';
        currentAgent = "";

        if (!dept) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = 'block';

        getStaffData()[dept].forEach(name => {
            const item = document.createElement('div');
            item.className = 'liquid-item';
            item.textContent = name;
            item.onclick = () => {
                document.querySelectorAll('.liquid-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentAgent = name;
            };
            mesh.appendChild(item);
        });
    }

    function goToMatrix() {
        if (!currentAgent) { alert("An operational unit must be selected."); return; }
        document.getElementById('step-1').classList.remove('active');
        document.getElementById('step-2').classList.add('active');
        document.getElementById('active-agent-title').textContent = currentAgent;
        buildMatrixOptions();
    }

    function buildMatrixOptions() {
        const rules = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const noWeekendOff = ["Keisha Cross Brown", ...rules];

        const isRestricted = rules.includes(currentAgent);
        const blockWeekendOff = noWeekendOff.includes(currentAgent);

        document.querySelectorAll('.day-input').forEach(select => {
            const day = select.getAttribute('data-day');
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let html = '';

            if (isRestricted) {
                html += `
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                `;
            } else {
                html += `
                    <option value="06:00 - 14:00">06:00 - 14:00</option>
                    <option value="07:00 - 15:00">07:00 - 15:00</option>
                    <option value="08:00 - 16:00">08:00 - 16:00</option>
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="12:00 - 20:00">12:00 - 20:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                    <option value="14:00 - 22:00">14:00 - 22:00</option>
                    <option value="15:00 - 23:00">15:00 - 23:00</option>
                `;
            }

            html += `<option value="OPEN">OPEN</option>`;
            html += `<option value="Vacaciones">Vacaciones</option>`;

            if (!(isWeekend && blockWeekendOff)) {
                html += `<option value="Day Off">Day Off</option>`;
            }

            select.innerHTML = html;
            refreshCellClass(select);
        });
    }

    function refreshCellClass(elem) {
        elem.classList.remove('st-active', 'st-off', 'st-vacation', 'st-open');
        if (elem.value === "Day Off") elem.classList.add('st-off');
        else if (elem.value === "Vacaciones") elem.classList.add('st-vacation');
        else if (elem.value === "OPEN") elem.classList.add('st-open');
        else elem.classList.add('st-active');
    }

    function backToStep1() {
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
    }

    function commitSchedule() {
        const dept = document.getElementById('department').value;
        const notes = document.getElementById('matrix-notes').value || "None";
        const targetDays = {};

        document.querySelectorAll('.day-input').forEach(sel => {
            targetDays[sel.getAttribute('data-day')] = sel.value;
        });

        let masterRoster = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        masterRoster = masterRoster.filter(r => r.name !== currentAgent);

        masterRoster.push({
            name: currentAgent,
            dept: dept,
            selections: targetDays,
            notes: notes,
            timestamp: new Date().toISOString()
        });

        localStorage.setItem('panda_master_roster', JSON.stringify(masterRoster));
        
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-3').classList.add('active');
    }

    function resetFlow() {
        document.getElementById('matrix-notes').value = "";
        document.getElementById('step-3').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
        loadStaffMesh();
    }

    function populateMgmtDropdowns() {
        const db = getStaffData();
        const transSel = document.getElementById('transfer-agent-select');
        const delSel = document.getElementById('delete-agent-select');

        transSel.innerHTML = '<option value="">Select Asset...</option>';
        delSel.innerHTML = '<option value="">Select Asset...</option>';

        Object.keys(db).forEach(dept => {
            db[dept].forEach(name => {
                const innerText = `${name} (${dept})`;
                const valueString = JSON.stringify({name, dept});
                
                transSel.appendChild(new Option(innerText, valueString));
                delSel.appendChild(new Option(innerText, valueString));
            });
        });
    }

    function executeAddMember() {
        const name = document.getElementById('add-name').value.trim();
        const dept = document.getElementById('add-dept').value;
        if(!name) return alert("Identify nomenclature.");
        
        const db = getStaffData();
        if(db[dept].includes(name)) return alert("Duplicate active asset.");

        db[dept].push(name); db[dept].sort();
        saveStaffData(db);
        document.getElementById('add-name').value = "";
        alert("Unit matrix generated.");
    }

    function executeTransfer() {
        const targetRaw = document.getElementById('transfer-agent-select').value;
        const newDept = document.getElementById('transfer-new-dept').value;
        if(!targetRaw) return alert("Identify element node.");

        const target = JSON.parse(targetRaw);
        if(target.dept === newDept) return alert("Node already belongs to target cluster.");

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        db[newDept].push(target.name); db[newDept].sort();
        saveStaffData(db);
        alert("Cluster updated successfully.");
    }

    function executeDeleteMember() {
        const targetRaw = document.getElementById('delete-agent-select').value;
        if(!targetRaw) return alert("Identify target node.");
        
        const target = JSON.parse(targetRaw);
        if(!confirm(`Authorize terminal deletion of ${target.name}?`)) return;

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        saveStaffData(db);
        alert("Node purged from register.");
    }

    async function triggerExcelExport() {
        const auth = prompt("Identity Challenge:");
        if (auth !== "Sups2019") return alert("Unauthorized execution.");

        const master = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        if(!master.length) return alert("Pipeline database empty.");

        const wb = new ExcelJS.Workbook();
        ["Calculo Phones", "Calculo Chats", "Calculo Processing Squad"].forEach(dKey => {
            const list = master.filter(m => m.dept === dKey);
            if(!list.length) return;

            const ws = wb.addWorksheet(dKey);
            ws.columns = [
                { header: 'Agent Name', key: 'name', width: 26 },
                { header: 'Monday', key: 'Monday', width: 16 },
                { header: 'Tuesday', key: 'Tuesday', width: 16 },
                { header: 'Wednesday', key: 'Wednesday', width: 16 },
                { header: 'Thursday', key: 'Thursday', width: 16 },
                { header: 'Friday', key: 'Friday', width: 16 },
                { header: 'Saturday', key: 'Saturday', width: 16 },
                { header: 'Sunday', key: 'Sunday', width: 16 },
                { header: 'Notes', key: 'notes', width: 30 }
            ];

            const hr = ws.getRow(1); hr.height = 28;
            hr.font = { bold: true, color: { argb: 'FFFFFF' }, name: 'Segoe UI' };
            hr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '1E221B' } };
            hr.alignment = { vertical: 'middle', horizontal: 'center' };

            list.forEach(entry => {
                const dataRow = { name: entry.name, notes: entry.notes, ...entry.selections };
                const row = ws.addRow(dataRow); row.height = 24;
                row.getCell('name').font = { bold: true, name: 'Segoe UI' };
                row.getCell('name').alignment = { vertical: 'middle' };

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(day => {
                    const cell = row.getCell(day);
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.font = { name: 'Segoe UI', bold: false, size: 10 };

                    let bg = "1E221B"; let fg = "F0F2ee";
                    if(dataRow[day] === "Day Off") { bg = "3a2222"; fg = "ff8888"; }
                    else if(dataRow[day] === "Vacaciones") { bg = "3a321c"; fg = "ffd075"; }
                    else if(dataRow[day] === "OPEN") { bg = "1c3a26"; fg = "8bf0b2"; }

                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bg } };
                    cell.font.color = { argb: 'FF' + fg };
                });
            });
        });

        const buf = await wb.xlsx.writeBuffer();
        const b = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `WFM_Dynamic_Roster.xlsx`;
        a.click();
    }
</script>
</body>
</html>
