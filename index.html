<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM // Mocha Mousse Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --mocha-primary: #9a7d6d; /* Color Mocha Mousse base */
            --mocha-light: #dccbc0;
            --mocha-bg: #f5f2ef;
            --mocha-text: #4a3f38;
            --white: #ffffff;
        }

        body {
            background-color: var(--mocha-bg);
            color: var(--mocha-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* Estilo de la nueva Home Page */
        .home-card {
            background: var(--white);
            border: 1px solid var(--mocha-light);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            margin-top: 50px;
        }

        .home-card h1 {
            font-size: 2.5rem;
            color: var(--mocha-primary);
            margin-bottom: 20px;
        }

        .home-card p {
            font-size: 1.1rem;
            color: var(--mocha-text);
            margin-bottom: 30px;
        }

        .btn-start {
            background: var(--mocha-primary);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        /* Estilos generales para las tablas y paneles existentes */
        .panel-view { display: none; }
        .panel-view.active-view { display: block; }
        
        .panel-card { 
            background: var(--white); 
            border: 1px solid var(--mocha-light); 
            border-radius: 12px; 
            padding: 28px; 
            margin-top: 20px;
        }

        .interactive-table { width: 100%; border-collapse: collapse; }
        .interactive-table th { background: #fdfaf8; border-bottom: 2px solid var(--mocha-light); padding: 12px; }
        .interactive-table td { border-bottom: 1px solid #eee; padding: 10px; }

        .navigation-dock { margin-bottom: 20px; display: flex; gap: 10px; }
        .dock-tab { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--mocha-light); background: transparent; cursor: pointer; }
        .dock-tab.active-tab { background: var(--mocha-primary); color: white; border-color: var(--mocha-primary); }
    </style>
</head>
<body>

<div class="container">
    <!-- Home Page Section -->
    <div id="home-view" class="panel-view active-view">
        <div class="home-card">
            <h1>Schedule Request Customer Service</h1>
            <p>Welcome to the tactical engine. Please proceed to manage your shifts.</p>
            <button class="btn-start" onclick="toggleView('request')">Enter Dashboard</button>
        </div>
    </div>

    <!-- Navigation (Hidden until user enters) -->
    <div id="main-content" style="display:none;">
        <div class="navigation-dock">
            <button class="dock-tab active-tab" onclick="toggleView('request')">Preferences</button>
            <button class="dock-tab" onclick="toggleView('engine')">Production Schedule</button>
        </div>

        <div id="view-request" class="panel-view active-view">
            <div class="panel-card">
                <h3>Input Deck</h3>
                <div id="reqBodyPhones"></div>
            </div>
        </div>

        <div id="view-engine" class="panel-view">
            <div class="panel-card">
                <h3>Production Schedule</h3>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleView(view) {
        // Muestra el contenido principal
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        
        // Lógica de navegación existente adaptada
        document.querySelectorAll('.panel-view').forEach(p => p.classList.remove('active-view'));
        document.getElementById(`view-${view}`).classList.add('active-view');
    }
</script>

</body>
</html>
