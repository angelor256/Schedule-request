<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Dynasty — Roster Portal</title>
    
    <!-- Heavy brush/graffiti type for title matching image_96f778.png plus clean body font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- ExcelJS Library for background compilation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --pitch-black: #0d0e12;     /* Deep contrast canvas */
            --card-gray: #181a21;       /* Contrasting card background */
            --border-gray: #262936;     /* Structural divider lines */
            --electric-blue: #00a8ff;   /* Sharp neon action color from image */
            --pure-white: #ffffff;      /* Main reading color */
            --muted-text: #7f8c8d;      /* Low priority helper text */
            --sans: 'Plus Jakarta Sans', sans-serif;
            --brush: 'Rock Salt', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--pitch-black);
            color: var(--pure-white);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(0, 168, 255, 0.15) 0%, transparent 70%);
        }

        .canvas-container {
            width: 100%;
            max-width: 1050px;
            background: var(--card-gray);
            border-radius: 24px;
            padding: 50px;
            position: relative;
            border: 1px solid var(--border-gray);
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.6);
        }

        /* HOME SCREEN (Inspired directly by image_96f778.png) */
        .home-view {
            text-align: center;
            padding: 80px 0;
        }

        .brush-title {
            font-family: var(--brush);
            font-size: 52px;
            color: var(--pure-white);
            line-height: 1.4;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-transform: uppercase;
            display: inline-block;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .home-view h2 {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--muted-text);
            margin-bottom: 50px;
        }

        /* VIEW CONSTRAINTS & TRANSITIONS */
        .stage-view {
            display: none;
        }

        .stage-view.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            font-size: 20px;
            font-weight: 800;
            color: var(--pure-white);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-dot {
            width: 10px;
            height: 10px;
            background: var(--electric-blue);
            border-radius: 50%;
        }

        /* Inputs and Select Boxes */
        select, textarea {
            width: 100%;
            background: var(--pitch-black);
            border: 1px solid var(--border-gray);
            padding: 18px;
            border-radius: 12px;
            color: var(--pure-white);
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: all 0.25s ease;
            margin-bottom: 35px;
            appearance: none;
        }

        select:focus, textarea:focus {
            border-color: var(--electric-blue);
            box-shadow: 0 0 15px rgba(0, 168, 255, 0.2);
        }

        /* Interactive Grid Layout */
        .fluid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 40px;
        }

        .fluid-btn {
            background: var(--pitch-black);
            border: 1px solid var(--border-gray);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted-text);
            transition: all 0.2s ease;
            text-align: center;
        }

        .fluid-btn:hover {
            border-color: rgba(255,255,255,0.3);
            color: var(--pure-white);
        }

        .fluid-btn.selected {
            background: rgba(0, 168, 255, 0.1);
            color: var(--electric-blue);
            border-color: var(--electric-blue);
        }

        /* Row Cascade Structuring */
        .cascade-flow {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .cascade-card {
            background: var(--pitch-black);
            border: 1px solid var(--border-gray);
            border-radius: 14px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .day-label {
            font-size: 16px;
            font-weight: 800;
            color: var(--pure-white);
            min-width: 120px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-inputs {
            display: flex;
            gap: 15px;
            flex: 1;
            align-items: center;
        }

        .card-inputs select {
            margin-bottom: 0;
            flex: 1;
            background: var(--card-gray);
            border: 1px solid var(--border-gray);
        }

        /* Premium Interface Action Trays */
        .action-tray {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
        }

        .btn-creative {
            padding: 16px 40px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-creative-primary {
            background: var(--electric-blue);
            color: var(--pure-white);
        }

        .btn-creative-primary:hover {
            background: #21b8ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 168, 255, 0.35);
        }

        .btn-creative-secondary {
            background: transparent;
            color: var(--muted-text);
            border: 1px solid var(--border-gray);
        }

        .btn-creative-secondary:hover {
            color: var(--pure-white);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .celebration-view {
            text-align: center;
            padding: 60px 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--pitch-black); }
        ::-webkit-scrollbar-thumb { background: var(--border-gray); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted-text); }
    </style>
</head>
<body>

<div class="canvas-container">

    <!-- SCREEN 0: HOME PAGE -->
    <div id="step-0" class="stage-view active">
        <div class="home-view">
            <div class="brush-title">Schedule Request</div>
            <h2>Panda Dynasty Portal</h2>
            <button class="btn-creative btn-creative-primary" onclick="changeStage(1)">Get Started</button>
        </div>
    </div>

    <!-- SCREEN 1: DIVISION & IDENTITY -->
    <div id="step-1" class="stage-view">
        <div class="section-header">
            <div class="color-dot"></div>
            <span>Select Operational Division</span>
        </div>
        <select id="department" onchange="buildFluidMesh()">
            <option value="">Choose department...</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Deposits">Deposits</option>
            <option value="Payouts">Payouts</option>
        </select>

        <div class="section-header" id="mesh-header" style="display:none;">
            <div class="color-dot"></div>
            <span>Select Corporate Identity</span>
        </div>
        <div class="fluid-grid" id="fluid-name-mesh" style="display:none;"></div>

        <div class="action-tray" style="justify-content: flex-end;">
            <button class="btn-creative btn-creative-primary" onclick="changeStage(2)">Next Step</button>
        </div>
    </div>

    <!-- SCREEN 2: ROSTER ENGINE -->
    <div id="step-2" class="stage-view">
        <div class="section-header">
            <div class="color-dot"></div>
            <span>Configure Weekly Plan</span>
        </div>
        
        <div class="cascade-flow" id="roster-cascade-container">
            <!-- Populated dynamically via JavaScript to process individual visibility rules -->
        </div>

        <div class="section-header">
            <div class="color-dot"></div>
            <span>Global Strategic Notes</span>
        </div>
        <textarea id="general-notes" rows="3" placeholder="Provide any high-level justifications, medical configurations, or scheduling contexts..."></textarea>

        <div class="action-tray">
            <button class="btn-creative btn-creative-secondary" onclick="changeStage(1)">Back</button>
            <button class="btn-creative btn-creative-primary" onclick="generateVibrantExcel()">Compile & Export</button>
        </div>
    </div>

    <!-- SCREEN 3: SUCCESS PACKAGING -->
    <div id="step-3" class="stage-view">
        <div class="celebration-view">
            <h2 style="color: var(--electric-blue); font-size: 28px; margin-bottom: 15px; font-family: var(--sans);">Roster Compiled Successfully</h2>
            <p style="color: var(--muted-text); font-size: 15px; max-width: 500px; margin: 0 auto 40px auto; font-weight: 600; line-height: 1.6;">
                Your scheduling selection has been cleanly mapped to the matrix grid structure and saved to your device downpath.
            </p>
            <button class="btn-creative btn-creative-secondary" onclick="resetPortal()">Generate New Entry</button>
        </div>
    </div>

</div>

<script>
    const teamData = {
        "Customer Service": [
            "Cristopher Sandoval", "Kendra Temple", "María José Fallas", "Natalia Sibaja", "Pablo Retana", 
            "Victor Ramírez", "Luis Carvajal", "Kendall Montoya", "Josué Vargas", "Kevin Salazar", 
            "Israel Aburto", "Vanessa Umana", "Naigell Beckford", "Nicole Román", "Mariana Varela", 
            "Tamara Donaire", "Eckart Lutz", "Isaac Porras", "Michelle Saborio", "Emerson Hernandez", 
            "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", "Elena Rojas", "Elliot Navarro", 
            "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros", "Andrey Castillo", "Rory Bulgarelli", 
            "Phillip Desanti", "Eddison Prendas", "Naomy Sanchez ", "Adrian Navarro", "Carlos Alejandro Amador Luna", 
            "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Carolina Castro", 
            "Daniel Leandro Rojas", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Luis Fernando Ruiz", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Deposits": ["Mariana Bejarano", "Cristopher Sandoval", "Eddison Prendas", "Diego Matamoros"],
        "Payouts": ["Carlos Amador", "Fer Blanco", "Graciela Bravo ", "Ignacio Blanco", "Kevin Zamora", "Samuel Carballo", "Sheydron Clark", "Sebastian Rivera", "Silvana Suarez"]
    };

    const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    let selectedAgentGlobal = "";

    function buildFluidMesh() {
        const dept = document.getElementById('department').value;
        const mesh = document.getElementById('fluid-name-mesh');
        const header = document.getElementById('mesh-header');
        
        mesh.innerHTML = '';
        selectedAgentGlobal = "";

        if (!dept) {
            mesh.style.display = 'none';
            header.style.display = 'none';
            return;
        }

        header.style.display = 'flex';
        mesh.style.display = 'grid';

        teamData[dept].forEach(name => {
            const btn = document.createElement('div');
            btn.className = 'fluid-btn';
            btn.textContent = name;
            btn.onclick = () => {
                document.querySelectorAll('.fluid-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedAgentGlobal = name;
            };
            mesh.appendChild(btn);
        });
    }

    function changeStage(stageNum) {
        if (stageNum === 2) {
            if (!selectedAgentGlobal) {
                alert('Please select your corporate identity before proceeding to execution.');
                return;
            }
            renderRosterCanvas();
        }
        document.querySelectorAll('.stage-view').forEach(v => v.style.display = 'none');
        document.getElementById(`step-${stageNum}`).style.display = 'block';
        document.getElementById(`step-${stageNum}`).classList.add('active');
    }

    function renderRosterCanvas() {
        const container = document.getElementById('roster-cascade-container');
        container.innerHTML = '';

        // Verification targets
        const middleOnlyAgents = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const standardAgentsNoWeekendOff = ["Keisha Cross Brown"];

        const isMiddleOnly = middleOnlyAgents.includes(selectedAgentGlobal);
        const isNoWeekendOff = isMiddleOnly || standardAgentsNoWeekendOff.includes(selectedAgentGlobal);

        weekDays.forEach(day => {
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let selectOptionsHtml = '';

            if (isMiddleOnly) {
                // Restricted to Middle Shifts exclusively
                selectOptionsHtml += `
                    <option value="09:00 - 17:00">09:00 AM - 05:00 PM</option>
                    <option value="10:00 - 18:00">10:00 AM - 06:00 PM</option>
                    <option value="11:00 - 19:00">11:00 AM - 07:00 PM</option>
                    <option value="13:00 - 21:00">01:00 PM - 09:00 PM</option>
                `;
            } else {
                // Standard default allocation framework
                selectOptionsHtml += `
                    <option value="06:00 - 14:00">AM Shift (06:00 - 14:00)</option>
                    <option value="07:00 - 15:00">AM Shift (07:00 - 15:00)</option>
                    <option value="14:00 - 22:00">PM Shift (14:00 - 22:00)</option>
                    <option value="15:00 - 23:00">PM Shift (15:00 - 23:00)</option>
                `;
            }

            // Append Day Off choice only if rules allow for weekend parameters
            if (!(isWeekend && isNoWeekendOff)) {
                selectOptionsHtml += `<option value="Day Off">🛑 Day Off</option>`;
            }

            const rawCard = document.createElement('div');
            rawCard.className = 'cascade-card';
            rawCard.innerHTML = `
                <div class="day-label">${day}</div>
                <div class="card-inputs">
                    <select class="shift-selector" data-day="${day}">
                        ${selectOptionsHtml}
                    </select>
                </div>
            `;
            container.appendChild(rawCard);
        });
    }

    function resetPortal() {
        document.getElementById('department').value = "";
        buildFluidMesh();
        document.getElementById('general-notes').value = "";
        changeStage(0);
    }

    async function generateVibrantExcel() {
        const dept = document.getElementById('department').value;
        const name = selectedAgentGlobal;
        const generalNotes = document.getElementById('general-notes').value || "None";

        const excelPalette = {
            "Day Off": { bg: "E2E8F0", fg: "475569" },
            "Default": { bg: "C6EFCE", fg: "006100" }
        };

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Roster Configuration');

        worksheet.columns = [
            { header: 'Agent Name', key: 'name', width: 28 },
            { header: 'Department', key: 'dept', width: 20 },
            { header: 'Day', key: 'day', width: 15 },
            { header: 'Shift Selection', key: 'pref', width: 25 },
            { header: 'Global Strategy Notes', key: 'general', width: 40 }
        ];

        const headerRow = worksheet.getRow(1);
        headerRow.height = 28;
        headerRow.font = { name: 'Segoe UI', bold: true, color: { argb: 'FFFFFF' }, size: 11 };
        headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '1C3D5A' } };
        headerRow.alignment = { vertical: 'middle', horizontal: 'center' };

        const selectors = document.querySelectorAll('.shift-selector');
        selectors.forEach((select, index) => {
            const day = select.getAttribute('data-day');
            const pref = select.value;

            const row = worksheet.addRow({
                name: (index === 0) ? name : '',
                dept: (index === 0) ? dept : '',
                day: day,
                pref: pref,
                general: (index === 0) ? generalNotes : ''
            });

            row.height = 24;
            row.getCell('name').font = { bold: true, name: 'Segoe UI', color: { argb: '2C3E50' } };
            row.getCell('day').font = { bold: true, name: 'Segoe UI' };
            row.getCell('day').alignment = { horizontal: 'center', vertical: 'middle' };
            row.getCell('pref').alignment = { horizontal: 'center', vertical: 'middle' };

            const colorConfig = excelPalette[pref] || excelPalette["Default"];
            row.getCell('pref').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + colorConfig.bg } };
            row.getCell('pref').font = { color: { argb: 'FF' + colorConfig.fg }, bold: true, name: 'Segoe UI', size: 10 };

            ['name', 'dept', 'day', 'pref', 'general'].forEach(col => {
                row.getCell(col).border = {
                    bottom: { style: 'thin', color: { argb: 'FFE5E9F0' } },
                    right: { style: 'thin', color: { argb: 'FFE5E9F0' } }
                };
            });
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Roster_Request_${name.replace(/\s+/g, '_')}.xlsx`;
        link.click();

        changeStage(3);
    }
</script>
</body>
</html>
