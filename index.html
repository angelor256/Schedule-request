<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Tactical Enterprise // Slate Edition v5.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-app: #090a0f;
            --bg-card: #14161f;
            --border-color: #222633;
            --text-title: #f8fafc;
            --text-body: #94a3b8;
            
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            
            /* Estados de turnos refinados */
            --sh-am-bg: #1e293b; --sh-am-txt: #38bdf8;
            --sh-pm-bg: #1e1b4b; --sh-pm-txt: #818cf8;
            --sh-off-bg: #2a1418; --sh-off-txt: #f87171;
            --sh-vac-bg: #2a2014; --sh-vac-txt: #fbbf24;
            --sh-op-bg: #064e3b; --sh-op-txt: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-app);
            color: var(--text-body);
            font-family: 'Inter', sans-serif;
            padding: 30px;
        }

        .container {
            max-width: 1750px;
            margin: 0 auto;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px 24px;
            border-radius: 12px;
        }
        .app-title h1 { font-size: 18px; color: var(--text-title); font-weight: 700; letter-spacing: -0.5px; }
        .app-title p { font-size: 12px; color: #64748b; margin-top: 2px; }

        /* Botones */
        .btn {
            background: #222533;
            border: 1px solid #31364c;
            color: var(--text-title);
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover { background: #2c3044; }
        .btn-primary { background: var(--accent-blue); border: none; }
        .btn-primary:hover { background: #2563eb; }
        .btn-purple { background: var(--accent-purple); border: none; }
        .btn-purple:hover { background: #7c3aed; }

        /* Contenedores de Trabajo */
        .main-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 25px;
        }
        .card-header-title {
            font-size: 15px;
            color: var(--text-title);
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Tabla Roster Principal */
        .roster-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .roster-table th {
            background: #1a1d29;
            color: #64748b;
            text-align: left;
            padding: 12px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }
        .roster-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #1a1d29;
            color: var(--text-title);
        }
        .dept-row-divider {
            background: #161924;
            color: var(--accent-blue) !important;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        .squad-badge {
            font-size: 11px;
            background: #1e293b;
            color: #94a3b8;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* Selectores dentro de la tabla */
        .grid-select {
            background: #1a1d29;
            border: 1px solid var(--border-color);
            color: var(--text-title);
            padding: 6px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            width: 115px;
            outline: none;
            cursor: pointer;
            text-align: center;
        }
        .grid-select.s-am { background: var(--sh-am-bg); color: var(--sh-am-txt); border-color: rgba(56,189,248,0.2); }
        .grid-select.s-pm { background: var(--sh-pm-bg); color: var(--sh-pm-txt); border-color: rgba(129,140,248,0.2); }
        .grid-select.s-off { background: var(--sh-off-bg); color: var(--sh-off-txt); border-color: rgba(248,113,113,0.2); }
        .grid-select.s-vac { background: var(--sh-vac-bg); color: var(--sh-vac-txt); border-color: rgba(251,191,36,0.2); }
        .grid-select.s-op { background: var(--sh-op-bg); color: var(--sh-op-txt); border-color: rgba(52,211,153,0.2); }

        /* Bloque de Métricas / Tabulación de Excel */
        .tabs-header {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #64748b;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
        }
        .tab-btn.active {
            background: #1e293b;
            color: var(--accent-blue);
        }

        .metric-grid-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        .metric-grid-table th, .metric-grid-table td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
        }
        .metric-grid-table th { background: #161924; color: #64748b; }
        .m-title-head { text-align: left !important; font-weight: 600; color: var(--text-title); }
        .sub-total-row { background: rgba(56,189,248,0.03); font-weight: 700; color: var(--sh-am-txt); }
        .off-total-row { background: rgba(248,113,113,0.03); font-weight: 700; color: var(--sh-off-txt); }
    </style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <div class="app-title">
            <h1>Tactical Workforce Management Panel</h1>
            <p>Roster Schedule Engine & Real-Time Target Allocation Matrix</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-purple" onclick="executeSmartEngine()">⚡ Generate Balanced Schedule</button>
            <button class="btn btn-primary" onclick="exportDataToExcel()">Download Master Copy</button>
        </div>
    </div>

    <div class="main-card" style="overflow-x: auto;">
        <div class="card-header-title">
            <span>Operational Master Roster Grid</span>
            <span style="font-size:12px; color:#64748b; font-weight:400;">All edits update coverage counts dynamically</span>
        </div>
        <table class="roster-table">
            <thead>
                <tr>
                    <th style="width: 250px;">Agent Full Name</th>
                    <th style="width: 120px;">Squad Tier</th>
                    <th>Monday</th><th>Tuesday</th><th>Wednesday</th><th>Thursday</th><th>Friday</th><th>Saturday</th><th>Sunday</th>
                </tr>
            </thead>
            <tbody id="rosterMasterBody">
                </tbody>
        </table>
    </div>

    <div class="main-card">
        <div class="tabs-header">
            <button class="tab-btn active" id="tab-global" onclick="switchMetricsView('global')">Global Consolidated</button>
            <button class="tab-btn" id="tab-phones" onclick="switchMetricsView('phones')">Calculo Phones Only</button>
            <button class="tab-btn" id="tab-chats" onclick="switchMetricsView('chats')">Calculo Chats Only</button>
        </div>
        
        <table class="metric-grid-table">
            <thead>
                <tr>
                    <th style="width: 220px; text-align: left;">Shift Window Matrix</th>
                    <th style="width: 12%;">Mon</th>
                    <th style="width: 12%;">Tue</th>
                    <th style="width: 12%;">Wed</th>
                    <th style="width: 12%;">Thu</th>
                    <th style="width: 12%;">Fri</th>
                    <th style="width: 12%;">Sat</th>
                    <th style="width: 12%;">Sun</th>
                </tr>
            </thead>
            <tbody id="metricsGridBody">
                </tbody>
        </table>
    </div>

</div>

<script>
    const masterRosterStructure = {
        "Calculo Phones": {
            "VIP": ["Emerson Hernandez", "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros"],
            "Senior": ["Andrey Castillo", "Rory Bulgarelli", "Phillip Desanti", "Eddison Prendas"],
            "Tier 2": ["Carlos Alejandro Amador Luna", "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Samuel Carballo"],
            "Tier 1": ["Luis Fernando Ruiz"]
        },
        "Calculo Chats": {
            "VIP": ["Elena Rojas", "Elliot Navarro", "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros"],
            "Senior": ["Naomy Sanchez", "Adrian Navarro", "Diego Matamoros"],
            "Tier 2": ["Carolina Castro", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", "Sheydron Clark"],
            "Tier 1": ["Keisha Cross Brown", "Marlon Wright"]
        }
    };

    const middleShiftRules = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
    const amWindows = ["06:00 AM", "07:00 AM", "09:00 AM", "10:00 AM"];
    const pmWindows = ["11:00 AM", "01:00 PM", "02:00 PM", "03:00 PM"];
    const daysOfWeek = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    // Diccionario de salida de turnos (Suposición estándar de 8 horas operativas + 1 hora de break = 9 horas en sitio)
    const shiftEndTimes = {
        "06:00 AM": 15, // 3:00 PM
        "07:00 AM": 16, // 4:00 PM
        "09:00 AM": 18, // 6:00 PM
        "10:00 AM": 19, // 7:00 PM
        "11:00 AM": 20, // 8:00 PM
        "01:00 PM": 22, // 10:00 PM
        "02:00 PM": 23, // 11:00 PM
        "03:00 PM": 24  // 12:00 AM (Medianoche)
    };

    let currentActiveView = 'global';

    window.onload = function() {
        if (!localStorage.getItem('wfm_enterprise_cache')) {
            initCache();
        }
        renderRosterGrid();
        calculateAndRenderMetrics();
    };

    function initCache() {
        const initialLog = [];
        Object.keys(masterRosterStructure).forEach(dept => {
            Object.keys(masterRosterStructure[dept]).forEach(squad => {
                masterRosterStructure[dept][squad].forEach(name => {
                    initialLog.push({
                        name: name,
                        dept: dept,
                        squad: squad,
                        shifts: { Monday:"06:00 AM", Tuesday:"06:00 AM", Wednesday:"Day Off", Thursday:"06:00 AM", Friday:"06:00 AM", Saturday:"Day Off", Sunday:"06:00 AM" }
                    });
                });
            });
        });
        localStorage.setItem('wfm_enterprise_cache', JSON.stringify(initialLog));
    }

    function getCache() { return JSON.parse(localStorage.getItem('wfm_enterprise_cache')); }
    function setCache(data) { localStorage.setItem('wfm_enterprise_cache', JSON.stringify(data)); }

    function renderRosterGrid() {
        const data = getCache();
        const tbody = document.getElementById('rosterMasterBody');
        tbody.innerHTML = "";

        Object.keys(masterRosterStructure).forEach(dept => {
            const separator = document.createElement('tr');
            separator.innerHTML = `<td colspan="9" class="dept-row-divider">■ ${dept.toUpperCase()} DIRECTORY</td>`;
            tbody.appendChild(separator);

            Object.keys(masterRosterStructure[dept]).forEach(squad => {
                masterRosterStructure[dept][squad].forEach(name => {
                    const agentData = data.find(r => r.name === name) || { shifts: {} };
                    const tr = document.createElement('tr');

                    let nameTd = `<td><span style="font-weight:500;">${name}</span></td>`;
                    let squadTd = `<td><span class="squad-badge">${squad}</span></td>`;
                    
                    let daysTds = "";
                    daysOfWeek.forEach(day => {
                        const currentShift = agentData.shifts[day] || "Day Off";
                        daysTds += `<td>${buildShiftSelectHTML(name, day, currentShift)}</td>`;
                    });

                    tr.innerHTML = nameTd + squadTd + daysTds;
                    tbody.appendChild(tr);
                });
            });
        });
    }

    function buildShiftSelectHTML(name, day, currentShift) {
        const isMiddle = middleShiftRules.includes(name);
        const amPool = ["06:00 AM", "07:00 AM"];
        const pmPool = ["02:00 PM", "03:00 PM"];
        const midPool = ["09:00 AM", "10:00 AM", "11:00 AM", "01:00 PM"];

        let allowedOptions = isMiddle ? [...midPool] : [...amPool, ...pmPool];
        allowedOptions.push("OPEN", "Vacaciones", "Day Off");

        let className = "s-am";
        if (pmWindows.includes(currentShift)) className = "s-pm";
        if (currentShift === "Day Off") className = "s-off";
        if (currentShift === "Vacaciones") className = "s-vac";
        if (currentShift === "OPEN") className = "s-op";

        let html = `<select class="grid-select ${className}" data-name="${name}" data-day="${day}" onchange="handleLiveShiftChange(this)">`;
        allowedOptions.forEach(opt => {
            const selected = opt === currentShift ? "selected" : "";
            html += `<option value="${opt}" ${selected}>${opt}</option>`;
        });
        html += `</select>`;
        return html;
    }

    function handleLiveShiftChange(selectEl) {
        const name = selectEl.getAttribute('data-name');
        const day = selectEl.getAttribute('data-day');
        const newVal = selectEl.value;

        let data = getCache();
        let agent = data.find(r => r.name === name);
        if (agent) {
            agent.shifts[day] = newVal;
            setCache(data);
        }

        selectEl.classList.remove('s-am', 's-pm', 's-off', 's-vac', 's-op');
        if (amWindows.includes(newVal)) selectEl.classList.add('s-am');
        if (pmWindows.includes(newVal)) selectEl.classList.add('s-pm');
        if (newVal === "Day Off") selectEl.classList.add('s-off');
        if (newVal === "Vacaciones") selectEl.classList.add('s-vac');
        if (newVal === "OPEN") selectEl.classList.add('s-op');

        calculateAndRenderMetrics();
    }

    // NUEVO MOTOR v5.0 CON VALIDACIÓN DE DESCANSO DE 12 HORAS Y BALANCEADOR DE CURVAS
    function executeSmartEngine() {
        let cache = getCache();
        const depts = ["Calculo Phones", "Calculo Chats"];
        const structuralTiers = ["VIP", "Senior", "Tier 2", "Tier 1"];

        depts.forEach(dept => {
            let globalAgentIndex = 0;

            structuralTiers.forEach(tier => {
                const groupNames = masterRosterStructure[dept][tier];
                
                groupNames.forEach(name => {
                    let agentRecord = cache.find(r => r.name === name);
                    const isMiddle = middleShiftRules.includes(name);

                    // Definir 2 días libres exactos fijos
                    let offDay1_Idx = (globalAgentIndex) % 7;
                    let offDay2_Idx = (globalAgentIndex + 3) % 7;
                    if(offDay1_Idx === offDay2_Idx) offDay2_Idx = (offDay2_Idx + 1) % 7;

                    let offDay1 = daysOfWeek[offDay1_Idx];
                    let offDay2 = daysOfWeek[offDay2_Idx];

                    globalAgentIndex++;

                    // Recorrer los días cronológicamente para calcular el descanso de 12 horas
                    for (let i = 0; i < daysOfWeek.length; i++) {
                        let day = daysOfWeek[i];

                        // Respetar bloqueos manuales especiales
                        if(agentRecord.shifts[day] === "Vacaciones" || agentRecord.shifts[day] === "OPEN") {
                            continue;
                        }

                        if (day === offDay1 || day === offDay2) {
                            agentRecord.shifts[day] = "Day Off";
                            continue;
                        }

                        // VALIDACIÓN DE 12 HORAS DE DESCANSO CON JORNADA ANTERIOR
                        let hourRestricted = false;
                        if (i > 0) {
                            let yesterday = daysOfWeek[i - 1];
                            let yesterdayShift = agentRecord.shifts[yesterday];
                            if (yesterdayShift && yesterdayShift !== "Day Off" && yesterdayShift !== "Vacaciones") {
                                let exitHour = shiftEndTimes[yesterdayShift];
                                // Si sale a las 10pm (22) o después, restringir entradas AM antes de las 10am del día siguiente
                                if (exitHour >= 22) {
                                    hourRestricted = true;
                                }
                            }
                        }

                        // ASIGNACIÓN BALANCEADA: Evita picos y balancea equitativamente AM/PM
                        if (tier === "VIP" || tier === "Senior") {
                            if (hourRestricted) {
                                agentRecord.shifts[day] = isMiddle ? "01:00 PM" : "02:00 PM";
                            } else {
                                if (i % 2 === 0) {
                                    agentRecord.shifts[day] = isMiddle ? "09:00 AM" : "06:00 AM";
                                } else {
                                    agentRecord.shifts[day] = isMiddle ? "11:00 AM" : "02:00 PM";
                                }
                            }
                        } else {
                            // Tiers inferiores actúan como ecualizadores de balance dinámico
                            if (hourRestricted) {
                                agentRecord.shifts[day] = isMiddle ? "03:00 PM" : "03:00 PM";
                            } else {
                                // Alternar linealmente para no saturar las tardes
                                if ((globalAgentIndex + i) % 2 === 0) {
                                    agentRecord.shifts[day] = isMiddle ? "10:00 AM" : "07:00 AM";
                                } else {
                                    agentRecord.shifts[day] = isMiddle ? "01:00 PM" : "02:00 PM";
                                }
                            }
                        }
                    }
                });
            });
        });

        setCache(cache);
        renderRosterGrid();
        calculateAndRenderMetrics();
        alert("⚡ Engine 5.0 Completed: 12-Hour Rest Restraints and Headcount Curves Successfully Enforced.");
    }

    function switchMetricsView(viewName) {
        currentActiveView = viewName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${viewName}`).classList.add('active');
        calculateAndRenderMetrics();
    }

    function calculateAndRenderMetrics() {
        const data = getCache();
        const allHours = [...amWindows, ...pmWindows];

        const countMatrix = {};
        allHours.forEach(h => {
            countMatrix[h] = {};
            daysOfWeek.forEach(d => countMatrix[h][d] = 0);
        });

        const amTotals = {}; const pmTotals = {}; const offTotals = {};
        daysOfWeek.forEach(d => { amTotals[d] = 0; pmTotals[d] = 0; offTotals[d] = 0; });

        data.forEach(agent => {
            if (currentActiveView === 'phones' && agent.dept !== 'Calculo Phones') return;
            if (currentActiveView === 'chats' && agent.dept !== 'Calculo Chats') return;

            daysOfWeek.forEach(day => {
                const shift = agent.shifts[day] || "Day Off";
                if (countMatrix[shift]) {
                    countMatrix[shift][day]++;
                }
                if (amWindows.includes(shift)) amTotals[day]++;
                if (pmWindows.includes(shift)) pmTotals[day]++;
                if (shift === "Day Off" || shift === "Vacaciones") offTotals[day]++;
            });
        });

        const tbody = document.getElementById('metricsGridBody');
        tbody.innerHTML = "";

        // A-Shifts
        tbody.innerHTML += `<tr><td colspan="8" class="m-title-head" style="color:var(--sh-am-txt);">▲ EARLY / MIDDLE SHIFTS (A-SHIFTS)</td></tr>`;
        amWindows.forEach(sh => {
            let row = `<tr><td style="text-align:left; font-weight:500;">${sh}</td>`;
            daysOfWeek.forEach(d => row += `<td>${countMatrix[sh][d]}</td>`);
            tbody.innerHTML += row + `</tr>`;
        });
        let amTotalRow = `<tr class="sub-total-row"><td>Total Active AM</td>`;
        daysOfWeek.forEach(d => amTotalRow += `<td>${amTotals[d]}</td>`);
        tbody.innerHTML += amTotalRow + `</tr>`;

        // B-Shifts
        tbody.innerHTML += `<tr><td colspan="8" class="m-title-head" style="color:var(--sh-pm-txt);">▼ LATE / CLOSING SHIFTS (B-SHIFTS)</td></tr>`;
        pmWindows.forEach(sh => {
            let row = `<tr><td style="text-align:left; font-weight:500;">${sh}</td>`;
            daysOfWeek.forEach(d => row += `<td>${countMatrix[sh][d]}</td>`);
            tbody.innerHTML += row + `</tr>`;
        });
        let pmTotalRow = `<tr class="sub-total-row"><td>Total Active PM</td>`;
        daysOfWeek.forEach(d => pmTotalRow += `<td>${pmTotals[d]}</td>`);
        tbody.innerHTML += pmTotalRow + `</tr>`;

        // Off counts
        let offRow = `<tr class="off-total-row"><td>OFF For The Day (Day Off + Vac)</td>`;
        daysOfWeek.forEach(d => offRow += `<td>${offTotals[d]} agent(s)</td>`);
        tbody.innerHTML += offRow + `</tr>`;
    }

    async function exportDataToExcel() {
        const log = getCache();
        const workbook = new ExcelJS.Workbook();
        
        ["Calculo Phones", "Calculo Chats"].forEach(deptName => {
            const sheet = workbook.addWorksheet(deptName);
            sheet.columns = [
                { header: 'Agent Full Name', key: 'name', width: 28 },
                { header: 'Squad Level', key: 'squad', width: 15 },
                ...daysOfWeek.map(d => ({ header: d, key: d, width: 15 }))
            ];

            const deptEntries = log.filter(e => e.dept === deptName);
            deptEntries.forEach(entry => {
                sheet.addRow({ name: entry.name, squad: entry.squad, ...entry.shifts });
            });
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const trigger = document.createElement("a");
        trigger.href = URL.createObjectURL(blob);
        trigger.download = `WFM_Enterprise_v5_Master.xlsx`;
        trigger.click();
    }
</script>
</body>
</html>
