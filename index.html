<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Core // Tactical Auto-Schedule Matrix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-main: #0a0c10;
            --panel-bg: #121620;
            --panel-border: #1f2638;
            --accent-neon: #00ff66;
            --accent-dim: rgba(0, 255, 102, 0.1);
            
            --text-pure: #ffffff;
            --text-ghost: #6c7a9c;
            --text-body: #cbd5e1;

            --off-bg: #2d191e; --off-txt: #ff5252;
            --vac-bg: #2d2619; --vac-txt: #ffb74d;
            --open-bg: #192d20; --open-txt: #26de81;
            --shift-bg: #1e2538; --shift-txt: #54a0ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 40px;
        }
        .workspace-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            max-width: 1700px;
            margin: 0 auto;
        }
        .bento-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
        }
        .header-system {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
        }
        .sys-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-pure);
        }
        .sys-title span {
            background: var(--accent-dim);
            color: var(--accent-neon);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            margin-left: 10px;
        }
        .dropdown-group { margin-bottom: 16px; }
        .dropdown-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-ghost);
            text-transform: uppercase;
            display: block;
            margin-bottom: 6px;
        }
        .main-dropdown {
            width: 100%;
            background: #080a0f;
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text-pure);
            outline: none;
            cursor: pointer;
        }
        .matrix-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 6px;
            margin: 20px 0;
        }
        .matrix-table th {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-ghost);
            text-transform: uppercase;
        }
        .cell-selector {
            width: 100%;
            background: #171d2a;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px 6px;
            color: var(--text-pure);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            outline: none;
            text-align-last: center;
            cursor: pointer;
        }
        .cell-selector.st-shift { background: var(--shift-bg); color: var(--shift-txt); }
        .cell-selector.st-off { background: var(--off-bg); color: var(--off-txt); }
        .cell-selector.st-vac { background: var(--vac-bg); color: var(--vac-txt); }
        .cell-selector.st-open { background: var(--open-bg); color: var(--open-txt); }

        .btn-action {
            background: #1c2333;
            border: 1px solid var(--panel-border);
            color: var(--text-pure);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-prime { background: var(--accent-neon); color: var(--bg-main); border: none; }
        .btn-prime:hover { box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        .btn-wizard { background: #4a154b; color: white; border: 1px solid #6b1d6c; }

        /* Estilos del Dashboard de Cobertura */
        .coverage-dashboard {
            margin-top: 24px;
            border-top: 1px dashed var(--panel-border);
            padding-top: 20px;
        }
        .coverage-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-pure);
            margin-bottom: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .metric-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-body);
        }
        .metric-table th, .metric-table td {
            border: 1px solid var(--panel-border);
            padding: 6px;
            text-align: center;
        }
        .metric-table th { background: #0e1118; color: var(--text-ghost); }
        .sub-total-row { background: rgba(84, 160, 255, 0.05); font-weight: 700; color: var(--shift-txt); }
        .off-total-row { background: rgba(255, 82, 82, 0.05); font-weight: 700; color: var(--off-txt); }
    </style>
</head>
<body>

<div class="workspace-grid">
    
    <!-- HEADER -->
    <div class="header-system">
        <div class="sys-title">WFM TACTICAL CORE <span>v4.0 // ENGINE ACTIVE</span></div>
        <div style="display: flex; gap: 12px;">
            <button class="btn-action btn-wizard" onclick="runOptimizationEngine()">⚡ Run Auto-Schedule Engine</button>
            <button class="btn-action btn-prime" onclick="exportDataToExcel()">Download Master Spreadsheet</button>
        </div>
    </div>

    <!-- PANEL IZQUIERDO: DEPARTAMENTOS -->
    <div class="bento-card">
        <div style="margin-bottom: 20px; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px;">
            <h3 style="color: var(--text-pure); font-size: 15px;">Asset Directory</h3>
            <p style="font-size: 11px; color: var(--text-ghost);">Select agent to view or edit parameters</p>
        </div>

        <div class="dropdown-group">
            <label class="dropdown-label" id="lbl-phones">Calculo Phones [--]</label>
            <select class="main-dropdown cluster-dd" id="dd-phones" onchange="handleDropdownSelection(this, 'Calculo Phones')">
                <option value="">Choose Agent...</option>
            </select>
        </div>

        <div class="dropdown-group">
            <label class="dropdown-label" id="lbl-chats">Calculo Chats [--]</label>
            <select class="main-dropdown cluster-dd" id="dd-chats" onchange="handleDropdownSelection(this, 'Calculo Chats')">
                <option value="">Choose Agent...</option>
            </select>
        </div>
    </div>

    <!-- PANEL DERECHO: MATRIZ Y CONTROL DE COBERTURA -->
    <div class="bento-card">
        <div id="activeEditor">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <span id="agentSquadBadge" style="font-family:'JetBrains Mono', monospace; font-size:10px; background: #252e42; color:var(--text-body); padding: 2px 6px; border-radius:4px; text-transform:uppercase;">Squad: --</span>
                    <h2 id="targetAgentName" style="color: var(--text-pure); font-size: 24px; font-weight: 800; margin-top: 4px;">Select an Agent</h2>
                </div>
            </div>
            
            <table class="matrix-table">
                <thead>
                    <tr>
                        <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><select class="cell-selector day-select" data-day="Monday" onchange="styleCell(this); updateLiveMetrics();"></select></td>
                        <td><select class="cell-selector day-select" data-day="Tuesday" onchange="styleCell(this); updateLiveMetrics();"></select></td>
                        <td><select class="cell-selector day-select" data-day="Wednesday" onchange="styleCell(this); updateLiveMetrics();"></select></td>
                        <td><select class="cell-selector day-select" data-day="Thursday" onchange="styleCell(this); updateLiveMetrics();"></select></td>
                        <td><select class="cell-selector day-select" data-day="Friday" onchange="styleCell(this); updateLiveMetrics();"></select></td>
                        <td><select class="cell-selector day-select" data-day="Saturday" onchange="styleCell(this); updateLiveMetrics();"></select></td>
                        <td><select class="cell-selector day-select" data-day="Sunday" onchange="styleCell(this); updateLiveMetrics();"></select></td>
                    </tr>
                </tbody>
            </table>
            
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px;">
                <button class="btn-action btn-prime" id="saveBtn" disabled onclick="saveAgentMatrix()">Apply Parameters</button>
            </div>
        </div>

        <!-- DASHBOARD DE COBERTURA GLOBAL (ESTILO EXCEL DE REFERENCIA) -->
        <div class="coverage-dashboard">
            <div class="coverage-title">📊 Live Operational Coverage Matrix (Global View)</div>
            <table class="metric-table" id="metricsTable">
                <thead>
                    <tr>
                        <th>Shift Window</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
                    </tr>
                </thead>
                <tbody id="metricsBody">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Configuración estructurada con Squads jerárquicos reales
    const rosterDatabase = {
        "Calculo Phones": {
            "VIP": ["Emerson Hernandez", "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros"],
            "Senior": ["Andrey Castillo", "Rory Bulgarelli", "Phillip Desanti", "Eddison Prendas"],
            "Tier 2": ["Carlos Alejandro Amador Luna", "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Samuel Carballo"],
            "Tier 1": ["Luis Fernando Ruiz"]
        },
        "Calculo Chats": {
            "VIP": ["Elena Rojas", "Elliot Navarro", "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros"],
            "Senior": ["Naomy Sanchez", "Adrian Navarro", "Diego Matamoros"],
            "Tier 2": ["Carolina Castro", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", "Sheydron Clark"],
            "Tier 1": ["Keisha Cross Brown", "Marlon Wright"]
        }
    };

    const middleShiftRules = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
    const allShifts = ["06:00 AM", "07:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "01:00 PM", "02:00 PM", "03:00 PM"];
    const daysOfWeek = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    let activeSelectedAgent = "";
    let activeSelectedCluster = "";

    window.onload = function() {
        if (!localStorage.getItem('wfm_master_log')) {
            localStorage.setItem('wfm_master_log', JSON.stringify([]));
        }
        populateDropdowns();
        updateLiveMetrics();
    };

    function populateDropdowns() {
        ["Calculo Phones", "Calculo Chats"].forEach(cluster => {
            const id = cluster === "Calculo Phones" ? "dd-phones" : "dd-chats";
            const lblId = cluster === "Calculo Phones" ? "lbl-phones" : "lbl-chats";
            const selectEl = document.getElementById(id);
            
            selectEl.innerHTML = '<option value="">Choose Agent...</option>';
            let count = 0;

            Object.keys(rosterDatabase[cluster]).forEach(squad => {
                const group = document.createElement('optgroup');
                group.label = `${squad} Squad`;
                
                rosterDatabase[cluster][squad].forEach(agent => {
                    count++;
                    const opt = document.createElement('option');
                    opt.value = agent;
                    opt.textContent = agent;
                    group.appendChild(opt);
                });
                selectEl.appendChild(group);
            });
            document.getElementById(lblId).textContent = `${cluster} [${count}]`;
        });
    }

    function handleDropdownSelection(selectEl, clusterName) {
        if (!selectEl.value) return;
        document.querySelectorAll('.cluster-dd').forEach(dd => { if(dd.id !== selectEl.id) dd.value = ""; });

        activeSelectedAgent = selectEl.value;
        activeSelectedCluster = clusterName;

        document.getElementById('targetAgentName').textContent = activeSelectedAgent;
        
        let foundSquad = "--";
        Object.keys(rosterDatabase[clusterName]).forEach(s => {
            if(rosterDatabase[clusterName][s].includes(activeSelectedAgent)) foundSquad = s;
        });
        document.getElementById('agentSquadBadge').textContent = `Squad: ${foundSquad}`;
        document.getElementById('saveBtn').disabled = false;

        configureMatrixInputs(activeSelectedAgent);
    }

    function configureMatrixInputs(name) {
        const isMiddleEstricto = middleShiftRules.includes(name);

        document.querySelectorAll('.day-select').forEach(select => {
            const day = select.getAttribute('data-day');
            let optionsHTML = '';

            const validPool = isMiddleEstricto ? ["09:00 AM", "10:00 AM", "11:00 AM", "01:00 PM"] : ["06:00 AM", "07:00 AM", "02:00 PM", "03:00 PM"];
            
            validPool.forEach(sh => optionsHTML += `<option value="${sh}">${sh}</option>`);
            optionsHTML += `<option value="OPEN">OPEN</option><option value="Vacaciones">Vacaciones</option><option value="Day Off">Day Off</option>`;
            
            select.innerHTML = optionsHTML;

            let log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
            let saved = log.find(r => r.name === name);
            if (saved && saved.shifts[day]) {
                select.value = saved.shifts[day];
            } else {
                select.value = "Day Off";
            }
            styleCell(select);
        });
    }

    function styleCell(elem) {
        elem.classList.remove('st-shift', 'st-off', 'st-vac', 'st-open');
        if (elem.value === "Day Off") elem.classList.add('st-off');
        else if (elem.value === "Vacaciones") elem.classList.add('st-vac');
        else if (elem.value === "OPEN") elem.classList.add('st-open');
        else elem.classList.add('st-shift');
    }

    function saveAgentMatrix() {
        const shifts = {};
        document.querySelectorAll('.day-select').forEach(sel => { shifts[sel.getAttribute('data-day')] = sel.value; });

        let log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
        log = log.filter(r => r.name !== activeSelectedAgent);

        log.push({
            name: activeSelectedAgent,
            cluster: activeSelectedCluster,
            shifts: shifts
        });

        localStorage.setItem('wfm_master_log', JSON.stringify(log));
        updateLiveMetrics();
        alert(`Parameters allocated for ${activeSelectedAgent}`);
    }

    // MOTOR AUTOMÁTICO DE OPTIMIZACIÓN (BASADO EN REGLAS DE NEGOCIO)
    function runOptimizationEngine() {
        let log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
        const clusters = ["Calculo Phones", "Calculo Chats"];

        clusters.forEach(cluster => {
            const squads = ["VIP", "Senior", "Tier 2", "Tier 1"];
            
            daysOfWeek.forEach((day, dayIdx) => {
                // Controladores de distribución por día de la semana para balancear OFFs
                let vipAmAssigned = 0;
                let vipPmAssigned = 0;

                squads.forEach(squad => {
                    const agents = rosterDatabase[cluster][squad];
                    
                    agents.forEach((agent, agentIdx) => {
                        let currentRecord = log.find(r => r.name === agent);
                        if (!currentRecord) {
                            currentRecord = { name: agent, cluster: cluster, shifts: {} };
                            log.push(currentRecord);
                        }

                        // REGRA DE ORO: Respetar si es manual pre-existente
                        if (currentRecord.shifts[day] === "Vacaciones" || currentRecord.shifts[day] === "OPEN") {
                            return;
                        }

                        const isMiddle = middleShiftRules.includes(agent);

                        // Asignación de días libres balanceados (2 libres por semana por agente)
                        // Distribución rotativa basada en el índice para evitar que todos caigan libres el mismo día
                        if ((agentIdx + dayIdx) % 7 === 0 || (agentIdx + dayIdx) % 7 === 4) {
                            currentRecord.shifts[day] = "Day Off";
                            return;
                        }

                        // LÓGICA ESPECÍFICA VIP
                        if (squad === "VIP") {
                            if (vipAmAssigned < 2) {
                                currentRecord.shifts[day] = isMiddle ? "09:00 AM" : "06:00 AM";
                                vipAmAssigned++;
                            } else {
                                currentRecord.shifts[day] = isMiddle ? "01:00 PM" : "02:00 PM";
                                vipPmAssigned++;
                            }
                        } 
                        // LÓGICA SENIORS Y TIERS (Relleno Equilibrado)
                        else {
                            if ((agentIdx + dayIdx) % 2 === 0) {
                                currentRecord.shifts[day] = isMiddle ? "10:00 AM" : "07:00 AM";
                            } else {
                                currentRecord.shifts[day] = isMiddle ? "11:00 AM" : "03:00 PM";
                            }
                        }
                    });
                });
            });
        });

        localStorage.setItem('wfm_master_log', JSON.stringify(log));
        updateLiveMetrics();
        if(activeSelectedAgent) configureMatrixInputs(activeSelectedAgent);
        alert("⚡ Optimization Strategy Executed Successfully: Roster Fully Balanced.");
    }

    // CALCULO DE MATRIZ DE COBERTURA EN TIEMPO REAL
    function updateLiveMetrics() {
        const log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
        const matrix = {};
        
        allShifts.forEach(sh => { matrix[sh] = {}; daysOfWeek.forEach(d => matrix[sh][d] = 0); });
        const totalsAM = {}; const totalsPM = {}; const totalsOFF = {};
        daysOfWeek.forEach(d => { totalsAM[d] = 0; totalsPM[d] = 0; totalsOFF[d] = 0; });

        log.forEach(record => {
            daysOfWeek.forEach(day => {
                const shift = record.shifts[day];
                if (matrix[shift]) {
                    matrix[shift][day]++;
                    if (["06:00 AM", "07:00 AM", "09:00 AM", "10:00 AM"].includes(shift)) totalsAM[day]++;
                    if (["11:00 AM", "01:00 PM", "02:00 PM", "03:00 PM"].includes(shift)) totalsPM[day]++;
                }
                if (shift === "Day Off" || shift === "Vacaciones") totalsOFF[day]++;
            });
        });

        const body = document.getElementById('metricsBody');
        body.innerHTML = "";

        // Renderizado Sección AM
        body.innerHTML += `<tr><td colspan="8" style="background:#171d2a; text-align:left; font-weight:700; color:var(--accent-neon);">▲ A-SHIFTS (EARLY / MIDDLE)</td></tr>`;
        ["06:00 AM", "07:00 AM", "09:00 AM", "10:00 AM"].forEach(sh => {
            let row = `<tr><td>${sh}</td>`;
            daysOfWeek.forEach(d => row += `<td>${matrix[sh][d]}</td>`);
            body.innerHTML += row + `</tr>`;
        });
        
        let totalAmRow = `<tr class="sub-total-row"><td>Total AM</td>`;
        daysOfWeek.forEach(d => totalAmRow += `<td>${totalsAM[d]}</td>`);
        body.innerHTML += totalAmRow + `</tr>`;

        // Renderizado Sección PM
        body.innerHTML += `<tr><td colspan="8" style="background:#171d2a; text-align:left; font-weight:700; color:var(--shift-txt);">▼ B-SHIFTS (LATE / CLOSING)</td></tr>`;
        ["11:00 AM", "01:00 PM", "02:00 PM", "03:00 PM"].forEach(sh => {
            let row = `<tr><td>${sh}</td>`;
            daysOfWeek.forEach(d => row += `<td>${matrix[sh][d]}</td>`);
            body.innerHTML += row + `</tr>`;
        });

        let totalPmRow = `<tr class="sub-total-row" style="color:var(--shift-txt);"><td>Total PM</td>`;
        daysOfWeek.forEach(d => totalPmRow += `<td>${totalsPM[d]}</td>`);
        body.innerHTML += totalPmRow + `</tr>`;

        // Fila de OFFs del día (Mismo formato de image_9335fb.png)
        let offRow = `<tr class="off-total-row"><td>OFF For The Day</td>`;
        daysOfWeek.forEach(d => offRow += `<td>${totalsOFF[d]} agent(s)</td>`);
        body.innerHTML += offRow + `</tr>`;
    }

    // EXPORTACIÓN A EXCEL COMPATIBLE
    async function exportDataToExcel() {
        const log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
        if(!log.length) return alert("Database is empty.");

        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('Master Schedule');

        sheet.columns = [
            { header: 'Agent Name', key: 'name', width: 25 },
            { header: 'Cluster', key: 'cluster', width: 18 },
            ...daysOfWeek.map(d => ({ header: d, key: d, width: 14 }))
        ];

        log.forEach(e => {
            sheet.addRow({ name: e.name, cluster: e.cluster, ...e.shifts });
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `WFM_Calculo_Generated_Schedule.xlsx`;
        link.click();
    }
</script>
</body>
</html>
