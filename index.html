<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA CS Scheduler</title>
    <style>
        /* Estilos base para el modo oscuro y layout limpio */
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-bg: rgba(88, 166, 255, 0.1);
            --danger: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
        }

        #app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--border-color);
            color: #fff;
        }

        .nav-item.active {
            border-left: 4px solid var(--accent);
            background-color: var(--accent-bg);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Grid de Métricas */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .metric-title {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.75rem;
            font-weight: bold;
            color: #fff;
        }

        /* Contenedores de contenido */
        .content-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .section-title {
            margin-bottom: 1.5rem;
            color: #fff;
        }

        /* Tablas */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .data-table th, .data-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Formularios básicos */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
        }

        .btn {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // ==========================================
        // SOLUCIÓN: Función ic() para procesar íconos
        // ==========================================
        function ic(name, props) {
            var size = props && props.size ? props.size : 16;
            var color = props && props.color ? props.color : 'currentColor';
            
            // Diccionario visual de símbolos unicode rápidos
            var glyphs = {
                star: '★',
                plus: '＋',
                trash: '🗑',
                cal: '📅',
                dash: '📊',
                users: '👥',
                user: '👤',
                inbox: '📥',
                settings: '⚙',
                sparkles: '✨',
                send: '➔',
                x: '✕',
                alert: '⚠',
                check: '✓'
            };

            var symbol = glyphs[name] || '•';
            return '<span style="display:inline-block; font-size:' + size + 'px; color:' + color + '; line-height:1; vertical-align:middle;">' + symbol + '</span>';
        }

        // ==========================================
        // Configuración de Estado Base de la App
        // ==========================================
        var state = {
            currentView: 'merit',
            agents: [
                { id: 1, name: 'Carlos Mendoza', tier: 'Tier 3', shift: '06:00 - 15:00', merits: 12, performance: 94 },
                { id: 2, name: 'Ana Rodríguez', tier: 'Tier 2', shift: '08:00 - 17:00', merits: 8, performance: 88 },
                { id: 3, name: 'Bryan Jiménez', tier: 'Tier 1', shift: '14:00 - 23:00', merits: 15, performance: 97 }
            ],
            meritLogs: [
                { id: 101, agent: 'Carlos Mendoza', type: 'Productividad', points: 2, date: '2026-07-15' },
                { id: 102, agent: 'Ana Rodríguez', type: 'Asistencia Perfecta', points: 3, date: '2026-07-14' },
                { id: 103, agent: 'Bryan Jiménez', type: 'Soporte Extra', points: 1, date: '2026-07-16' }
            ]
        };

        // ==========================================
        // Motores de Renderizado (Vistas)
        // ==========================================
        function renderSidebar() {
            var menuItems = [
                { id: 'merit', label: 'Dashboard de Méritos', icon: 'dash' },
                { id: 'agents', label: 'Gestión de Agentes', icon: 'users' },
                { id: 'schedule', label: 'Horarios CS', icon: 'cal' },
                { id: 'settings', label: 'Configuración', icon: 'settings' }
            ];

            var html = '<div class="sidebar">';
            html += '<div class="brand">' + ic('sparkles', { size: 20, color: 'var(--accent)' }) + ' BA CS Scheduler</div>';
            html += '<ul class="nav-list">';
            
            menuItems.forEach(function(item) {
                var activeClass = state.currentView === item.id ? 'active' : '';
                html += '<li>';
                html += '<a class="nav-item ' + activeClass + '" href="#" onclick="switchView(\'' + item.id + '\')">';
                html += ic(item.icon) + ' ' + item.label;
                html += '</a>';
                html += '</li>';
            });

            html += '</ul></div>';
            return html;
        }

        function renderHeader(title) {
            var html = '<div class="header">';
            html += '<h2>' + title + '</h2>';
            html += '<div class="user-profile">' + ic('user', { size: 18 }) + ' <span>Supervisor</span></div>';
            html += '</div>';
            return html;
        }

        function renderMeritView() {
            var html = '<div class="main-content">';
            html += renderHeader('Sistema Balanceado de Méritos');

            // Tarjetas de Métricas Rápidas
            html += '<div class="metrics-grid">';
            html += '<div class="metric-card"><div class="metric-title">Total Agentes</div><div class="metric-value">' + state.agents.length + '</div></div>';
            html += '<div class="metric-card"><div class="metric-title">Méritos Otorgados (Mes)</div><div class="metric-value">35</div></div>';
            html += '<div class="metric-card"><div class="metric-title">Eficiencia General</div><div class="metric-value">93%</div></div>';
            html += '</div>';

            // Tabla de Historial
            html += '<div class="content-section">';
            html += '<h3 class="section-title">' + ic('star', { color: 'gold' }) + ' Últimos Méritos Asignados</h3>';
            html += '<table class="data-table"><thead><tr><th>Agente</th><th>Razón / Tipo</th><th>Puntos</th><th>Fecha</th></tr></thead><tbody>';
            
            state.meritLogs.forEach(function(log) {
                html += '<tr><td>' + log.agent + '</td><td>' + log.type + '</td><td>+' + log.points + '</td><td>' + log.date + '</td></tr>';
            });

            html += '</tbody></table></div></div>';
            return html;
        }

        function renderAgentsView() {
            var html = '<div class="main-content">';
            html += renderHeader('Lista de Agentes del Equipo');

            html += '<div class="content-section">';
            html += '<h3 class="section-title">Agentes Activos</h3>';
            html += '<table class="data-table"><thead><tr><th>Nombre</th><th>Tier</th><th>Horario Actual</th><th>Méritos acumulados</th><th>Performance</th></tr></thead><tbody>';
            
            state.agents.forEach(function(agent) {
                html += '<tr><td>' + agent.name + '</td><td>' + agent.tier + '</td><td>' + agent.shift + '</td><td>' + agent.merits + ' pts</td><td>' + agent.performance + '%</td></tr>';
            });

            html += '</tbody></table></div></div>';
            return html;
        }

        function renderScheduleView() {
            var html = '<div class="main-content">';
            html += renderHeader('Asignación de Horarios');
            html += '<div class="content-section"><h3>Calendario Semanal</h3><p style="color:var(--text-muted); margin-top:1rem;">Módulo de arrastrar y soltar turnos en desarrollo...</p></div>';
            html += '</div>';
            return html;
        }

        function renderSettingsView() {
            var html = '<div class="main-content">';
            html += renderHeader('Configuración del Sistema');
            html += '<div class="content-section"><h3 class="section-title">Parámetros</h3><div class="form-group"><label>Límite crítico de alertas de Performance</label><input type="number" class="form-control" value="85"></div><button class="btn">Guardar Cambios</button></div>';
            html += '</div>';
            return html;
        }

        // ==========================================
        // Orquestador de la Aplicación (Core)
        // ==========================================
        function generate(view) {
            state.currentView = view;
            var container = document.getElementById('app');
            var htmlStructure = renderSidebar();

            if (view === 'merit') htmlStructure += renderMeritView();
            else if (view === 'agents') htmlStructure += renderAgentsView();
            else if (view === 'schedule') htmlStructure += renderScheduleView();
            else if (view === 'settings') htmlStructure += renderSettingsView();

            container.innerHTML = htmlStructure;
        }

        function switchView(viewId) {
            generate(viewId);
        }

        // Inicializar la aplicación mostrando el Dashboard por defecto
        generate('merit');
    </script>
</body>
</html>
