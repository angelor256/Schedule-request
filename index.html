<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Studio — Central Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-canvas: #f8f7f4; /* Tono lino pálido, cálido y premium */
            --bg-card: #ffffff;
            --brand-primary: #2b2e2a; /* Carbón vegetal profundo */
            --brand-neutral: #717568; /* Sage apagado */
            --border-color: #e5e4df;
            
            /* Estados en tonos orgánicos tenues */
            --bg-off: #f2ebe9;
            --text-off: #9e5346;
            --bg-vacation: #f6efe2;
            --text-vacation: #b88630;
            --bg-open: #edf2ec;
            --text-open: #54734b;
            
            --font-global: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-canvas);
            color: var(--brand-primary);
            font-family: var(--font-global);
            min-height: 100vh;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: -0.01em;
        }

        .workspace-card {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 45px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(43, 46, 42, 0.03);
            margin-bottom: 30px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 25px;
            margin-bottom: 40px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--brand-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Botones de Estilo Escandinavo */
        .action-button {
            background: transparent;
            border: 1px solid var(--brand-primary);
            color: var(--brand-primary);
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-button:hover {
            background: var(--brand-primary);
            color: #ffffff;
        }
        .btn-callout {
            background: var(--brand-primary);
            color: #ffffff;
        }
        .btn-callout:hover {
            background: transparent;
            color: var(--brand-primary);
        }

        .view-step { display: none; }
        .view-step.active { display: block; }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-neutral);
            margin-bottom: 10px;
            font-weight: 600;
        }

        select, textarea, input {
            width: 100%;
            background: #faf9f6;
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 8px;
            color: var(--brand-primary);
            font-size: 14px;
            font-family: var(--font-global);
            outline: none;
            transition: all 0.2s ease;
            margin-bottom: 30px;
        }
        select:focus, input:focus { 
            border-color: var(--brand-primary);
            background: #ffffff;
        }

        /* Grid Organizador de Personal */
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
            max-height: 290px;
            overflow-y: auto;
            margin-bottom: 40px;
            padding-right: 5px;
        }
        .directory-item {
            background: #faf9f6;
            border: 1px solid var(--border-color);
            padding: 15px 18px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            color: var(--brand-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .directory-item:hover {
            border-color: var(--brand-neutral);
            background: #f4f3ee;
        }
        .directory-item.selected {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: #ffffff;
        }

        /* Contenedor e Interfaz de Tabla */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 35px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .roster-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        .roster-table th {
            background: #faf9f6;
            padding: 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--brand-neutral);
            border-bottom: 1px solid var(--border-color);
            text-align: left;
            font-weight: 600;
        }
        .roster-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
        }

        /* Estilo Interno de la Matriz */
        .cell-selector {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            margin-bottom: 0;
            background: #faf9f6;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .cell-selector.st-active { 
            color: var(--brand-primary);
            border-color: var(--border-color);
            background: #ffffff;
        }
        .cell-selector.st-off { 
            color: var(--text-off); 
            background: var(--bg-off);
        }
        .cell-selector.st-vacation { 
            color: var(--text-vacation); 
            background: var(--bg-vacation);
        }
        .cell-selector.st-open { 
            color: var(--text-open); 
            background: var(--bg-open);
        }

        /* Panel Administrativo */
        .admin-card {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 35px 45px;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 25px;
        }
        .panel-box {
            background: #faf9f6;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .panel-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 18px;
            color: var(--brand-primary);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>

<div class="workspace-card">
    <div class="app-header">
        <div class="app-title">WFM System Directory</div>
        <button class="action-button" onclick="triggerExcelExport()">Export Dataset</button>
    </div>

    <!-- PASO 1: SELECCIÓN DE SQUAD -->
    <div id="step-1" class="view-step active">
        <label>Operational Group</label>
        <select id="department" onchange="loadStaffMesh()">
            <option value="">Select Group...</option>
            <option value="Calculo Phones">Calculo Phones</option>
            <option value="Calculo Chats">Calculo Chats</option>
            <option value="Calculo Processing Squad">Calculo Processing Squad</option>
        </select>

        <div id="mesh-wrapper" style="display:none;">
            <label>Squad Roster</label>
            <div class="directory-grid" id="staff-mesh"></div>
        </div>

        <div style="text-align: right; margin-top: 10px;">
            <button class="action-button btn-callout" onclick="goToMatrix()">Open Matrix</button>
        </div>
    </div>

    <!-- PASO 2: ASIGNACIÓN DE TURNOS -->
    <div id="step-2" class="view-step">
        <div style="margin-bottom: 30px;">
            <span style="font-size: 11px; color: var(--brand-neutral); text-transform: uppercase; letter-spacing: 0.5px;">Active Profile</span>
            <div id="active-agent-title" style="font-size: 24px; font-weight: 700; margin-top: 2px;">---</div>
        </div>

        <div class="table-responsive">
            <table class="roster-table">
                <thead>
                    <tr>
                        <th>Monday</th>
                        <th>Tuesday</th>
                        <th>Wednesday</th>
                        <th>Thursday</th>
                        <th>Friday</th>
                        <th>Saturday</th>
                        <th>Sunday</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><select class="cell-selector day-input" data-day="Monday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-selector day-input" data-day="Tuesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-selector day-input" data-day="Wednesday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-selector day-input" data-day="Thursday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-selector day-input" data-day="Friday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-selector day-input" data-day="Saturday" onchange="refreshCellClass(this)"></select></td>
                        <td><select class="cell-selector day-input" data-day="Sunday" onchange="refreshCellClass(this)"></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <label>System Comments / Audit Notes</label>
        <textarea id="matrix-notes" rows="2" placeholder="Describe exceptions or updates..."></textarea>

        <div style="display:flex; justify-content: space-between;">
            <button class="action-button" onclick="backToStep1()">Back</button>
            <button class="action-button btn-callout" onclick="commitSchedule()">Save Schedule</button>
        </div>
    </div>

    <!-- PASO 3: CONFIRMACIÓN -->
    <div id="step-3" class="view-step" style="text-align:center; padding: 30px 0;">
        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">Schedule Committed</h3>
        <p style="color: var(--brand-neutral); font-size: 13px; margin-bottom: 25px;">Changes have been cached cleanly in system local tables.</p>
        <button class="action-button btn-callout" onclick="resetFlow()">Process Next</button>
    </div>
</div>

<!-- GESTIÓN INTEGRAL DE GRUPOS -->
<div class="admin-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Squad Registry Console</div>
        <button class="action-button" style="padding: 6px 16px; font-size: 11px;" onclick="toggleMgmtPanel()">Unlock Access</button>
    </div>

    <div id="mgmt-panel-content" class="admin-grid" style="display:none;">
        <!-- INSERTAR ELEMENTO -->
        <div class="panel-box">
            <div class="panel-title">Add To Group</div>
            <input type="text" id="add-name" placeholder="Full Name">
            <select id="add-dept">
                <option value="Calculo Phones">Calculo Phones</option>
                <option value="Calculo Chats">Calculo Chats</option>
                <option value="Calculo Processing Squad">Calculo Processing Squad</option>
            </select>
            <button class="action-button btn-callout" style="width:100%;" onclick="executeAddMember()">Add Member</button>
        </div>

        <!-- TRANSLADAR ELEMENTO -->
        <div class="panel-box">
            <div class="panel-title">Shift Group Allocation</div>
            <select id="transfer-agent-select"><option value="">Select Member...</option></select>
            <select id="transfer-new-dept">
                <option value="Calculo Phones">Calculo Phones</option>
                <option value="Calculo Chats">Calculo Chats</option>
                <option value="Calculo Processing Squad">Calculo Processing Squad</option>
            </select>
            <button class="action-button" style="width:100%;" onclick="executeTransfer()">Transfer Member</button>
        </div>

        <!-- REMOVER ELEMENTO -->
        <div class="panel-box">
            <div class="panel-title" style="color: var(--text-off);">Remove From Database</div>
            <select id="delete-agent-select"><option value="">Select Member...</option></select>
            <button class="action-button" style="width:100%; border-color: var(--text-off); color: var(--text-off);" onclick="executeDeleteMember()">Remove Member</button>
        </div>
    </div>
</div>

<script>
    const defaultTeam = {
        "Calculo Phones": [
            "Emerson Hernandez", "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", 
            "Andrey Castillo", "Rory Bulgarelli", "Phillip Desanti", "Eddison Prendas", 
            "Carlos Alejandro Amador Luna", "Carlos Ortiz", "David Vogler", "Valerie Alfaro", 
            "Jose Maria Cartin Peralta", "Samuel Carballo", "Luis Fernando Ruiz"
        ],
        "Calculo Chats": [
            "Elena Rojas", "Elliot Navarro", "Julian Mena", "Sebastian Puerta", 
            "Maria Jose Quiros Quiros", "Naomy Sanchez", "Adrian Navarro", "Diego Matamoros", 
            "Carolina Castro", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Sheydron Clark", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Calculo Processing Squad": [
            "Carlos Amador", "Fer Blanco", "Graciela Bravo", "Ignacio Blanco", 
            "Kevin Zamora", "Sebastian Rivera", "Silvana Suarez"
        ]
    };

    if (!localStorage.getItem('panda_staff_db')) {
        localStorage.setItem('panda_staff_db', JSON.stringify(defaultTeam));
    }

    let currentAgent = "";
    let mgmtUnlocked = false;

    function getStaffData() { return JSON.parse(localStorage.getItem('panda_staff_db')); }

    function saveStaffData(data) {
        localStorage.setItem('panda_staff_db', JSON.stringify(data));
        loadStaffMesh();
        populateMgmtDropdowns();
    }

    function toggleMgmtPanel() {
        if (!mgmtUnlocked) {
            const pass = prompt("Enter Supervisor Password:");
            if (pass !== "Sups2019") { alert("Access Denied."); return; }
            mgmtUnlocked = true;
        }
        const panel = document.getElementById('mgmt-panel-content');
        panel.style.display = panel.style.display === 'none' ? 'grid' : 'none';
        populateMgmtDropdowns();
    }

    function loadStaffMesh() {
        const dept = document.getElementById('department').value;
        const wrapper = document.getElementById('mesh-wrapper');
        const mesh = document.getElementById('staff-mesh');
        mesh.innerHTML = '';
        currentAgent = "";

        if (!dept) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = 'block';

        getStaffData()[dept].forEach(name => {
            const item = document.createElement('div');
            item.className = 'directory-item';
            item.textContent = name;
            item.onclick = () => {
                document.querySelectorAll('.directory-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                currentAgent = name;
            };
            mesh.appendChild(item);
        });
    }

    function goToMatrix() {
        if (!currentAgent) { alert("Please pick an agent first."); return; }
        document.getElementById('step-1').classList.remove('active');
        document.getElementById('step-2').classList.add('active');
        document.getElementById('active-agent-title').textContent = currentAgent;
        buildMatrixOptions();
    }

    function buildMatrixOptions() {
        const rules = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const noWeekendOff = ["Keisha Cross Brown", ...rules];

        const isRestricted = rules.includes(currentAgent);
        const blockWeekendOff = noWeekendOff.includes(currentAgent);

        document.querySelectorAll('.day-input').forEach(select => {
            const day = select.getAttribute('data-day');
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let html = '';

            if (isRestricted) {
                html += `
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                `;
            } else {
                html += `
                    <option value="06:00 - 14:00">06:00 - 14:00</option>
                    <option value="07:00 - 15:00">07:00 - 15:00</option>
                    <option value="08:00 - 16:00">08:00 - 16:00</option>
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="12:00 - 20:00">12:00 - 20:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                    <option value="14:00 - 22:00">14:00 - 22:00</option>
                    <option value="15:00 - 23:00">15:00 - 23:00</option>
                `;
            }

            html += `<option value="OPEN">OPEN</option>`;
            html += `<option value="Vacaciones">Vacaciones</option>`;

            if (!(isWeekend && blockWeekendOff)) {
                html += `<option value="Day Off">Day Off</option>`;
            }

            select.innerHTML = html;
            refreshCellClass(select);
        });
    }

    function refreshCellClass(elem) {
        elem.classList.remove('st-active', 'st-off', 'st-vacation', 'st-open');
        if (elem.value === "Day Off") elem.classList.add('st-off');
        else if (elem.value === "Vacaciones") elem.classList.add('st-vacation');
        else if (elem.value === "OPEN") elem.classList.add('st-open');
        else elem.classList.add('st-active');
    }

    function backToStep1() {
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
    }

    function commitSchedule() {
        const dept = document.getElementById('department').value;
        const notes = document.getElementById('matrix-notes').value || "None";
        const targetDays = {};

        document.querySelectorAll('.day-input').forEach(sel => {
            targetDays[sel.getAttribute('data-day')] = sel.value;
        });

        let masterRoster = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        masterRoster = masterRoster.filter(r => r.name !== currentAgent);

        masterRoster.push({
            name: currentAgent,
            dept: dept,
            selections: targetDays,
            notes: notes,
            timestamp: new Date().toISOString()
        });

        localStorage.setItem('panda_master_roster', JSON.stringify(masterRoster));
        
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('step-3').classList.add('active');
    }

    function resetFlow() {
        document.getElementById('matrix-notes').value = "";
        document.getElementById('step-3').classList.remove('active');
        document.getElementById('step-1').classList.add('active');
        loadStaffMesh();
    }

    function populateMgmtDropdowns() {
        const db = getStaffData();
        const transSel = document.getElementById('transfer-agent-select');
        const delSel = document.getElementById('delete-agent-select');

        transSel.innerHTML = '<option value="">Select Member...</option>';
        delSel.innerHTML = '<option value="">Select Member...</option>';

        Object.keys(db).forEach(dept => {
            db[dept].forEach(name => {
                const innerText = `${name} (${dept})`;
                const valueString = JSON.stringify({name, dept});
                
                transSel.appendChild(new Option(innerText, valueString));
                delSel.appendChild(new Option(innerText, valueString));
            });
        });
    }

    function executeAddMember() {
        const name = document.getElementById('add-name').value.trim();
        const dept = document.getElementById('add-dept').value;
        if(!name) return alert("Please specify a name.");
        
        const db = getStaffData();
        if(db[dept].includes(name)) return alert("Member already exists in this group.");

        db[dept].push(name); db[dept].sort();
        saveStaffData(db);
        document.getElementById('add-name').value = "";
        alert("Member registered successfully.");
    }

    function executeTransfer() {
        const targetRaw = document.getElementById('transfer-agent-select').value;
        const newDept = document.getElementById('transfer-new-dept').value;
        if(!targetRaw) return alert("Select a member first.");

        const target = JSON.parse(targetRaw);
        if(target.dept === newDept) return alert("Member is already in that group.");

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        db[newDept].push(target.name); db[newDept].sort();
        saveStaffData(db);
        alert("Group membership transferred.");
    }

    function executeDeleteMember() {
        const targetRaw = document.getElementById('delete-agent-select').value;
        if(!targetRaw) return alert("Select a member first.");
        
        const target = JSON.parse(targetRaw);
        if(!confirm(`Are you sure you want to remove ${target.name}?`)) return;

        const db = getStaffData();
        db[target.dept] = db[target.dept].filter(n => n !== target.name);
        saveStaffData(db);
        alert("Member deleted.");
    }

    async function triggerExcelExport() {
        const auth = prompt("Admin Security Verification:");
        if (auth !== "Sups2019") return alert("Access Denied.");

        const master = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        if(!master.length) return alert("No active data entries to export.");

        const wb = new ExcelJS.Workbook();
        ["Calculo Phones", "Calculo Chats", "Calculo Processing Squad"].forEach(dKey => {
            const list = master.filter(m => m.dept === dKey);
            if(!list.length) return;

            const ws = wb.addWorksheet(dKey);
            ws.columns = [
                { header: 'Agent Name', key: 'name', width: 26 },
                { header: 'Monday', key: 'Monday', width: 16 },
                { header: 'Tuesday', key: 'Tuesday', width: 16 },
                { header: 'Wednesday', key: 'Wednesday', width: 16 },
                { header: 'Thursday', key: 'Thursday', width: 16 },
                { header: 'Friday', key: 'Friday', width: 16 },
                { header: 'Saturday', key: 'Saturday', width: 16 },
                { header: 'Sunday', key: 'Sunday', width: 16 },
                { header: 'Notes', key: 'notes', width: 30 }
            ];

            const hr = ws.getRow(1); hr.height = 28;
            hr.font = { bold: true, color: { argb: 'FFFFFF' }, name: 'Segoe UI' };
            hr.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '2B2E2A' } };
            hr.alignment = { vertical: 'middle', horizontal: 'center' };

            list.forEach(entry => {
                const dataRow = { name: entry.name, notes: entry.notes, ...entry.selections };
                const row = ws.addRow(dataRow); row.height = 24;
                row.getCell('name').font = { bold: true, name: 'Segoe UI' };
                row.getCell('name').alignment = { vertical: 'middle' };

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(day => {
                    const cell = row.getCell(day);
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.font = { name: 'Segoe UI', bold: false, size: 10 };

                    let bg = "FFFFFF"; let fg = "2B2E2A";
                    if(dataRow[day] === "Day Off") { bg = "F2ECEB"; fg = "9E5346"; }
                    else if(dataRow[day] === "Vacaciones") { bg = "F6EFE2"; fg = "B88630"; }
                    else if(dataRow[day] === "OPEN") { bg = "EDF2EC"; fg = "54734b"; }

                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bg } };
                    cell.font.color = { argb: 'FF' + fg };
                });
            });
        });

        const buf = await wb.xlsx.writeBuffer();
        const b = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `WFM_Studio_Roster.xlsx`;
        a.click();
    }
</script>
</body>
</html>
