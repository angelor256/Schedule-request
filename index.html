<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Dynasty — Roster Portal</title>
    
    <!-- Heavy brush font for title matching image_96f778.png + clean premium body font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ExcelJS for Admin Multi-Sheet Horizontal Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --panel-bg: #ffffff;
            --electric-blue: #007aff;    /* Premium energetic vibrant blue */
            --electric-hover: #0062cc;
            --charcoal: #1e293b;         /* Sharp legible text */
            --border-light: #e2e8f0;     /* Clean dividers */
            --muted-gray: #64748b;       /* Clean subtitle colors */
            --sans: 'Plus Jakarta Sans', sans-serif;
            --brush: 'Rock Salt', cursive;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--charcoal);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .canvas-container {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: 32px;
            padding: 50px;
            position: relative;
            box-shadow: 0 25px 60px rgba(30, 41, 59, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* ADMIN EXPORT BUTTON */
        .admin-tray {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 10;
        }

        .btn-admin {
            background: #f1f5f9;
            color: var(--muted-gray);
            border: 1px solid var(--border-light);
            padding: 10px 18px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-admin:hover {
            background: var(--charcoal);
            color: #ffffff;
            border-color: var(--charcoal);
        }

        /* HOME SCREEN (Vibrant clean brush setup) */
        .home-view {
            text-align: center;
            padding: 60px 0;
        }

        .brush-title {
            font-family: var(--brush);
            font-size: 54px;
            color: var(--charcoal);
            line-height: 1.4;
            margin-bottom: 15px;
            letter-spacing: -2px;
            text-transform: uppercase;
            display: inline-block;
            text-shadow: 3px 3px 0px rgba(0, 122, 255, 0.1);
        }

        .home-view h2 {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--muted-gray);
            margin-bottom: 45px;
        }

        /* SCREEN MANAGEMENT */
        .stage-view {
            display: none;
        }

        .stage-view.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            font-size: 18px;
            font-weight: 800;
            color: var(--charcoal);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .color-dot {
            width: 8px;
            height: 8px;
            background: var(--electric-blue);
            border-radius: 50%;
        }

        /* Clean Interface Form Styling */
        select, textarea {
            width: 100%;
            background: #f8fafc;
            border: 1px solid var(--border-light);
            padding: 18px;
            border-radius: 16px;
            color: var(--charcoal);
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s ease;
            margin-bottom: 35px;
            appearance: none;
        }

        select:focus, textarea:focus {
            background: #ffffff;
            border-color: var(--electric-blue);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        /* Grid Selection Setup */
        .fluid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 12px;
            max-height: 280px;
            overflow-y: auto;
            padding: 4px;
            margin-bottom: 40px;
        }

        .fluid-btn {
            background: #f8fafc;
            border: 1px solid var(--border-light);
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--charcoal);
            transition: all 0.2s ease;
            text-align: center;
        }

        .fluid-btn:hover {
            border-color: var(--electric-blue);
            background: #ffffff;
        }

        .fluid-btn.selected {
            background: var(--electric-blue);
            color: #ffffff;
            border-color: var(--electric-blue);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
        }

        /* Roster Row Containers */
        .cascade-flow {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .cascade-card {
            background: #f8fafc;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .day-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--charcoal);
            min-width: 120px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-inputs {
            display: flex;
            gap: 15px;
            flex: 1;
            align-items: center;
        }

        .card-inputs select {
            margin-bottom: 0;
            flex: 1;
            background: #ffffff;
        }

        /* Premium Buttons */
        .action-tray {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
        }

        .btn-creative {
            padding: 16px 42px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-creative-primary {
            background: var(--electric-blue);
            color: #ffffff;
            box-shadow: 0 8px 25px rgba(0, 122, 255, 0.2);
        }

        .btn-creative-primary:hover {
            background: var(--electric-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 122, 255, 0.35);
        }

        .btn-creative-secondary {
            background: #f1f5f9;
            color: var(--muted-gray);
        }

        .btn-creative-secondary:hover {
            background: #e2e8f0;
            color: var(--charcoal);
        }

        .celebration-view {
            text-align: center;
            padding: 50px 0;
        }

        /* Custom Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

<div class="canvas-container">

    <!-- SUPS EXPORT MASTER TRIGGER -->
    <div class="admin-tray">
        <button class="btn-admin" onclick="triggerAdminExport()">Export Master Roster</button>
    </div>

    <!-- SCREEN 0: HOME PAGE -->
    <div id="step-0" class="stage-view active">
        <div class="home-view">
            <div class="brush-title">Schedule Request</div>
            <h2>Panda Dynasty Portal</h2>
            <button class="btn-creative btn-creative-primary" onclick="changeStage(1)">Get Started</button>
        </div>
    </div>

    <!-- SCREEN 1: OPERATIONAL IDENTITY -->
    <div id="step-1" class="stage-view">
        <div class="section-header">
            <div class="color-dot"></div>
            <span>Select Operational Division</span>
        </div>
        <select id="department" onchange="buildFluidMesh()">
            <option value="">Choose department...</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Deposits">Deposits</option>
            <option value="Payouts">Payouts</option>
        </select>

        <div class="section-header" id="mesh-header" style="display:none;">
            <div class="color-dot"></div>
            <span>Select Corporate Identity</span>
        </div>
        <div class="fluid-grid" id="fluid-name-mesh" style="display:none;"></div>

        <div class="action-tray" style="justify-content: flex-end;">
            <button class="btn-creative btn-creative-primary" onclick="changeStage(2)">Next Step</button>
        </div>
    </div>

    <!-- SCREEN 2: ROSTER ENGINE -->
    <div id="step-2" class="stage-view">
        <div class="section-header">
            <div class="color-dot"></div>
            <span>Configure Weekly Plan</span>
        </div>
        
        <div class="cascade-flow" id="roster-cascade-container"></div>

        <div class="section-header">
            <div class="color-dot"></div>
            <span>Global Strategic Notes</span>
        </div>
        <textarea id="general-notes" rows="3" placeholder="Provide any high-level justifications, scheduling contexts..."></textarea>

        <div class="action-tray">
            <button class="btn-creative btn-creative-secondary" onclick="changeStage(1)">Back</button>
            <button class="btn-creative btn-creative-primary" onclick="saveAgentRequestLocal()">Save Selection</button>
        </div>
    </div>

    <!-- SCREEN 3: SAVED CONFIRMATION -->
    <div id="step-3" class="stage-view">
        <div class="celebration-view">
            <h2 style="color: var(--electric-blue); font-size: 26px; margin-bottom: 15px;">Selection Saved Successfully</h2>
            <p style="color: var(--muted-gray); font-size: 15px; max-width: 500px; margin: 0 auto 40px auto; font-weight: 600; line-height: 1.6;">
                Your parameters have been logged into local storage. The system is ready for the next request.
            </p>
            <button class="btn-creative btn-creative-primary" onclick="resetPortal()">Log Another Request</button>
        </div>
    </div>

</div>

<script>
    const teamData = {
        "Customer Service": [
            "Cristopher Sandoval", "Kendra Temple", "María José Fallas", "Natalia Sibaja", "Pablo Retana", 
            "Victor Ramírez", "Luis Carvajal", "Kendall Montoya", "Josué Vargas", "Kevin Salazar", 
            "Israel Aburto", "Vanessa Umana", "Naigell Beckford", "Nicole Román", "Mariana Varela", 
            "Tamara Donaire", "Eckart Lutz", "Isaac Porras", "Michelle Saborio", "Emerson Hernandez", 
            "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", "Elena Rojas", "Elliot Navarro", 
            "Julian Mena", "Sebastian Puerta", "Maria Jose Quiros Quiros", "Andrey Castillo", "Rory Bulgarelli", 
            "Phillip Desanti", "Eddison Prendas", "Naomy Sanchez ", "Adrian Navarro", "Carlos Alejandro Amador Luna", 
            "Carlos Ortiz", "David Vogler", "Valerie Alfaro", "Jose Maria Cartin Peralta", "Carolina Castro", 
            "Daniel Leandro Rojas", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Luis Fernando Ruiz", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Deposits": ["Mariana Bejarano", "Cristopher Sandoval", "Eddison Prendas", "Diego Matamoros"],
        "Payouts": ["Carlos Amador", "Fer Blanco", "Graciela Bravo ", "Ignacio Blanco", "Kevin Zamora", "Samuel Carballo", "Sheydron Clark", "Sebastian Rivera", "Silvana Suarez"]
    };

    const weekDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    let selectedAgentGlobal = "";

    function buildFluidMesh() {
        const dept = document.getElementById('department').value;
        const mesh = document.getElementById('fluid-name-mesh');
        const header = document.getElementById('mesh-header');
        
        mesh.innerHTML = '';
        selectedAgentGlobal = "";

        if (!dept) {
            mesh.style.display = 'none';
            header.style.display = 'none';
            return;
        }

        header.style.display = 'flex';
        mesh.style.display = 'grid';

        teamData[dept].forEach(name => {
            const btn = document.createElement('div');
            btn.className = 'fluid-btn';
            btn.textContent = name;
            btn.onclick = () => {
                document.querySelectorAll('.fluid-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedAgentGlobal = name;
            };
            mesh.appendChild(btn);
        });
    }

    function changeStage(stageNum) {
        if (stageNum === 2) {
            if (!selectedAgentGlobal) {
                alert('Please select your corporate identity before proceeding.');
                return;
            }
            renderRosterCanvas();
        }
        document.querySelectorAll('.stage-view').forEach(v => v.style.display = 'none');
        document.getElementById(`step-${stageNum}`).style.display = 'block';
        document.getElementById(`step-${stageNum}`).classList.add('active');
    }

    function renderRosterCanvas() {
        const container = document.getElementById('roster-cascade-container');
        container.innerHTML = '';

        const middleOnlyAgents = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const standardAgentsNoWeekendOff = ["Keisha Cross Brown"];

        const isMiddleOnly = middleOnlyAgents.includes(selectedAgentGlobal);
        const isNoWeekendOff = isMiddleOnly || standardAgentsNoWeekendOff.includes(selectedAgentGlobal);

        weekDays.forEach(day => {
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let selectOptionsHtml = '';

            if (isMiddleOnly) {
                selectOptionsHtml += `
                    <option value="09:00 - 17:00">09:00 AM - 05:00 PM</option>
                    <option value="10:00 - 18:00">10:00 AM - 06:00 PM</option>
                    <option value="11:00 - 19:00">11:00 AM - 07:00 PM</option>
                    <option value="13:00 - 21:00">01:00 PM - 09:00 PM</option>
                `;
            } else {
                selectOptionsHtml += `
                    <option value="06:00 - 14:00">AM Shift (06:00 - 14:00)</option>
                    <option value="07:00 - 15:00">AM Shift (07:00 - 15:00)</option>
                    <option value="14:00 - 22:00">PM Shift (14:00 - 22:00)</option>
                    <option value="15:00 - 23:00">PM Shift (15:00 - 23:00)</option>
                `;
            }

            if (!(isWeekend && isNoWeekendOff)) {
                selectOptionsHtml += `<option value="Day Off">🛑 Day Off</option>`;
            }

            const rawCard = document.createElement('div');
            rawCard.className = 'cascade-card';
            rawCard.innerHTML = `
                <div class="day-label">${day}</div>
                <div class="card-inputs">
                    <select class="shift-selector" data-day="${day}">
                        ${selectOptionsHtml}
                    </select>
                </div>
            `;
            container.appendChild(rawCard);
        });
    }

    function saveAgentRequestLocal() {
        const dept = document.getElementById('department').value;
        const name = selectedAgentGlobal;
        const generalNotes = document.getElementById('general-notes').value || "None";

        const dailySelections = {};
        const selectors = document.querySelectorAll('.shift-selector');
        selectors.forEach(select => {
            const day = select.getAttribute('data-day');
            dailySelections[day] = select.value;
        });

        let masterList = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        masterList = masterList.filter(entry => entry.name !== name);

        masterList.push({
            name: name,
            dept: dept,
            selections: dailySelections,
            notes: generalNotes,
            timestamp: new Date().toISOString()
        });

        localStorage.setItem('panda_master_roster', JSON.stringify(masterList));
        changeStage(3);
    }

    function resetPortal() {
        document.getElementById('department').value = "";
        buildFluidMesh();
        document.getElementById('general-notes').value = "";
        changeStage(0);
    }

    async function triggerAdminExport() {
        const passwordInput = prompt("Enter Supervisor Authentication Password:");
        if (passwordInput !== "Sups2019") {
            alert("Access Denied. Incorrect Administrative Password.");
            return;
        }

        const masterList = JSON.parse(localStorage.getItem('panda_master_roster')) || [];
        if (masterList.length === 0) {
            alert("No schedule requests found in memory to export yet.");
            return;
        }

        const workbook = new ExcelJS.Workbook();
        
        // Group data records dynamically by department
        const departmentsToProcess = ["Customer Service", "Deposits", "Payouts"];
        
        departmentsToProcess.forEach(currentDept => {
            // Filter entries for this specific tab
            const deptEntries = masterList.filter(entry => entry.dept === currentDept);
            if (deptEntries.length === 0) return; // Skip generating empty sheets

            const worksheet = workbook.addWorksheet(currentDept);

            // Set up horizontal column schema
            worksheet.columns = [
                { header: 'Agent Name', key: 'name', width: 28 },
                { header: 'Monday', key: 'Monday', width: 22 },
                { header: 'Tuesday', key: 'Tuesday', width: 22 },
                { header: 'Wednesday', key: 'Wednesday', width: 22 },
                { header: 'Thursday', key: 'Thursday', width: 22 },
                { header: 'Friday', key: 'Friday', width: 22 },
                { header: 'Saturday', key: 'Saturday', width: 22 },
                { header: 'Sunday', key: 'Sunday', width: 22 },
                { header: 'Strategic Notes', key: 'general', width: 40 }
            ];

            // Format main structural row headers
            const headerRow = worksheet.getRow(1);
            headerRow.height = 28;
            headerRow.font = { name: 'Segoe UI', bold: true, color: { argb: 'FFFFFF' }, size: 11 };
            headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '007AFF' } };
            headerRow.alignment = { vertical: 'middle', horizontal: 'center' };

            // Render one unified horizontal row per agent
            deptEntries.forEach(agentEntry => {
                const rowData = {
                    name: agentEntry.name,
                    general: agentEntry.notes,
                    Monday: agentEntry.selections['Monday'] || 'OFF',
                    Tuesday: agentEntry.selections['Tuesday'] || 'OFF',
                    Wednesday: agentEntry.selections['Wednesday'] || 'OFF',
                    Thursday: agentEntry.selections['Thursday'] || 'OFF',
                    Friday: agentEntry.selections['Friday'] || 'OFF',
                    Saturday: agentEntry.selections['Saturday'] || 'OFF',
                    Sunday: agentEntry.selections['Sunday'] || 'OFF'
                };

                const row = worksheet.addRow(rowData);
                row.height = 26;

                // Format Name field cell
                row.getCell('name').font = { bold: true, name: 'Segoe UI', color: { argb: '1E293B' } };
                row.getCell('name').alignment = { vertical: 'middle' };
                row.getCell('general').alignment = { vertical: 'middle' };

                // Apply style matrix to day columns horizontally
                weekDays.forEach(day => {
                    const cell = row.getCell(day);
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };

                    let bgColor = "C6EFCE"; // Standard green layout
                    let fgColor = "006100";
                    
                    if (rowData[day] === "Day Off") {
                        bgColor = "E2E8F0"; // Grey out indicators
                        fgColor = "475569";
                    }

                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bgColor } };
                    cell.font = { color: { argb: 'FF' + fgColor }, bold: true, name: 'Segoe UI', size: 10 };
                });

                // Apply universal grid structure borders
                row.eachCell({ includeEmpty: true }, (cell) => {
                    cell.border = {
                        bottom: { style: 'thin', color: { argb: 'FFE2E8F0' } },
                        right: { style: 'thin', color: { argb: 'FFE2E8F0' } }
                    };
                });
            });
        });

        // Generate matrix download package
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Master_Horizontal_Roster.xlsx`;
        link.click();
    }
</script>
</body>
</html>
