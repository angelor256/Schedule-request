<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WFM Core // Tactical Matrix Dropdown</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --bg-main: #0a0c10;
            --panel-bg: #121620;
            --panel-border: #1f2638;
            --accent-neon: #00ff66;
            --accent-dim: rgba(0, 255, 102, 0.1);
            
            --text-pure: #ffffff;
            --text-ghost: #6c7a9c;
            --text-body: #cbd5e1;

            --off-bg: #2d191e; --off-txt: #ff5252;
            --vac-bg: #2d2619; --vac-txt: #ffb74d;
            --open-bg: #192d20; --open-txt: #26de81;
            --shift-bg: #1e2538; --shift-txt: #54a0ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 40px;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .bento-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
        }

        .header-system {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
        }

        .sys-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-pure);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sys-title span {
            background: var(--accent-dim);
            color: var(--accent-neon);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 102, 0.2);
        }

        /* Estilos de los Selectores de dropdown */
        .dropdown-group {
            margin-bottom: 20px;
        }
        .dropdown-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-ghost);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }
        .main-dropdown {
            width: 100%;
            background: #080a0f;
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 14px;
            color: var(--text-pure);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }
        .main-dropdown:focus {
            border-color: var(--accent-neon);
        }

        .editor-workspace {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 500px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            color: var(--text-ghost);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            text-align: center;
            border: 2px dashed var(--panel-border);
            border-radius: 12px;
            padding: 40px;
        }

        .matrix-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px;
            margin: 25px 0;
        }
        .matrix-table th {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-ghost);
            text-transform: uppercase;
            padding-bottom: 5px;
        }

        .cell-selector {
            width: 100%;
            background: #171d2a;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 14px 10px;
            color: var(--text-pure);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            text-align-last: center;
            transition: all 0.25s ease;
        }
        
        .cell-selector.st-shift { background: var(--shift-bg); border-color: rgba(84, 160, 255, 0.3); color: var(--shift-txt); }
        .cell-selector.st-off { background: var(--off-bg); border-color: rgba(255, 82, 82, 0.3); color: var(--off-txt); }
        .cell-selector.st-vac { background: var(--vac-bg); border-color: rgba(255, 183, 77, 0.3); color: var(--vac-txt); }
        .cell-selector.st-open { background: var(--open-bg); border-color: rgba(38, 222, 129, 0.3); color: var(--open-txt); }

        .btn-action {
            background: #1c2333;
            border: 1px solid var(--panel-border);
            color: var(--text-pure);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
        }
        .btn-action:hover {
            background: #252e42;
            border-color: var(--text-ghost);
        }
        .btn-prime {
            background: var(--accent-neon);
            color: var(--bg-main);
            border: none;
        }
        .btn-prime:hover {
            background: #00d957;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
        }
        .btn-random {
            background: #4a154b;
            color: #ffffff;
            border: 1px solid #6b1d6c;
            padding: 6px 14px;
            font-size: 11px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .btn-random:hover {
            background: #611f62;
            box-shadow: 0 0 10px rgba(107, 29, 108, 0.5);
        }

        .admin-footer {
            grid-column: span 2;
            margin-top: 10px;
            border-top: 1px dashed var(--panel-border);
            padding-top: 30px;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .admin-box {
            background: #0e1118;
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px;
        }
        .admin-box label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-ghost);
            display: block;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .admin-box input, .admin-box select {
            width: 100%;
            background: #171d2a;
            border: 1px solid var(--panel-border);
            padding: 10px 14px;
            border-radius: 8px;
            color: var(--text-pure);
            margin-bottom: 12px;
            outline: none;
        }
    </style>
</head>
<body>

<div class="workspace-grid">
    
    <div class="header-system">
        <div class="sys-title">WFM // CONTROL MATRIX <span>v3.0</span></div>
        <button class="btn-action btn-prime" onclick="exportDataToExcel()">Download Master Spreadsheet</button>
    </div>

    <div class="bento-card">
        <div style="margin-bottom: 25px; border-bottom: 1px solid var(--panel-border); padding-bottom: 15px;">
            <h3 style="color: var(--text-pure); font-size: 16px;">Asset Directory</h3>
            <p style="font-size: 12px; color: var(--text-ghost);">Select cluster asset from dropdown lists</p>
        </div>

        <div class="dropdown-group">
            <label class="dropdown-label" id="lbl-phones">Calculo Phones [--]</label>
            <select class="main-dropdown cluster-dd" id="dd-phones" onchange="handleDropdownSelection(this, 'Calculo Phones')">
                <option value="">Choose Agent...</option>
            </select>
        </div>

        <div class="dropdown-group">
            <label class="dropdown-label" id="lbl-chats">Calculo Chats [--]</label>
            <select class="main-dropdown cluster-dd" id="dd-chats" onchange="handleDropdownSelection(this, 'Calculo Chats')">
                <option value="">Choose Agent...</option>
            </select>
        </div>

        <div class="dropdown-group">
            <label class="dropdown-label" id="lbl-proc">Processing Squad [--]</label>
            <select class="main-dropdown cluster-dd" id="dd-proc" onchange="handleDropdownSelection(this, 'Calculo Processing Squad')">
                <option value="">Choose Agent...</option>
            </select>
        </div>
    </div>

    <div class="bento-card">
        <div id="editorContainer" class="editor-workspace">
            <div class="empty-state" id="emptyState">
                [SYSTEM IDLE]<br><br>Please choose an operational asset from the dropdown clusters to unlock scheduling properties.
            </div>

            <div id="activeEditor" style="display: none; flex-direction: column; justify-content: space-between; height: 100%;">
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <span style="font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--accent-neon); text-transform:uppercase;">Active Allocation Target</span>
                            <h2 id="targetAgentName" style="color: var(--text-pure); font-size: 28px; font-weight: 800; margin-top: 2px;">---</h2>
                            <p id="targetAgentCluster" style="font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--text-ghost); margin-top: 4px;">Cluster: --</p>
                        </div>
                        <button class="btn-action btn-random" onclick="randomizeShifts()">🎲 Randomize Schedule</button>
                    </div>
                    
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><select class="cell-selector day-select" data-day="Monday" onchange="styleCell(this)"></select></td>
                                <td><select class="cell-selector day-select" data-day="Tuesday" onchange="styleCell(this)"></select></td>
                                <td><select class="cell-selector day-select" data-day="Wednesday" onchange="styleCell(this)"></select></td>
                                <td><select class="cell-selector day-select" data-day="Thursday" onchange="styleCell(this)"></select></td>
                                <td><select class="cell-selector day-select" data-day="Friday" onchange="styleCell(this)"></select></td>
                                <td><select class="cell-selector day-select" data-day="Saturday" onchange="styleCell(this)"></select></td>
                                <td><select class="cell-selector day-select" data-day="Sunday" onchange="styleCell(this)"></select></td>
                            </tr>
                        </tbody>
                    </table>

                    <label style="font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--text-ghost); display:block; margin-bottom:8px; text-transform:uppercase;">Contextual Logs / Deviations</label>
                    <input type="text" id="nodeNotes" style="width: 100%; background: #080a0f; border: 1px solid var(--panel-border); border-radius: 10px; padding: 12px 16px; color: var(--text-pure);" placeholder="Log standard deviations, exceptions, or observations here...">
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid var(--panel-border); padding-top: 20px;">
                    <button class="btn-action" onclick="dismissEditor()">Dismiss</button>
                    <button class="btn-action btn-prime" onclick="saveAgentMatrix()">Apply Parameters</button>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-footer">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-family:'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color:var(--text-pure);">ROSTER REGISTRY MANAGEMENT</div>
            <button class="btn-action" style="padding: 6px 14px; font-size: 11px;" id="lockBtn" onclick="unlockAdminConsole()">Authorize Console</button>
        </div>

        <div class="admin-grid" id="adminConsoleGrid" style="opacity: 0.3; pointer-events: none; transition: all 0.3s ease;">
            <div class="admin-box">
                <label>Add Operational Asset</label>
                <input type="text" id="newAssetName" placeholder="Legal Full Name">
                <select id="newAssetCluster">
                    <option value="Calculo Phones">Calculo Phones</option>
                    <option value="Calculo Chats">Calculo Chats</option>
                    <option value="Calculo Processing Squad">Calculo Processing Squad</option>
                </select>
                <button class="btn-action btn-prime" style="width:100%; font-size:11px;" onclick="addAsset()">Deploy to Cluster</button>
            </div>

            <div class="admin-box">
                <label>Cluster Re-Allocation</label>
                <select id="moveAssetSelect"><option value="">Select Asset...</option></select>
                <select id="moveAssetTarget">
                    <option value="Calculo Phones">Calculo Phones</option>
                    <option value="Calculo Chats">Calculo Chats</option>
                    <option value="Calculo Processing Squad">Calculo Processing Squad</option>
                </select>
                <button class="btn-action" style="width:100%; font-size:11px;" onclick="moveAsset()">Execute Relocation</button>
            </div>

            <div class="admin-box">
                <label style="color:var(--off-txt);">Purge Asset Log</label>
                <select id="purgeAssetSelect"><option value="">Select Target...</option></select>
                <button class="btn-action" style="width:100%; font-size:11px; border-color:rgba(255,82,82,0.4); color:var(--off-txt);" onclick="purgeAsset()">Execute Terminal Purge</button>
            </div>
        </div>
    </div>

</div>

<script>
    const initialDataset = {
        "Calculo Phones": [
            "Emerson Hernandez", "Stephannie Cunningham", "Thimy Gonzalez", "Yasser Quiros", 
            "Andrey Castillo", "Rory Bulgarelli", "Phillip Desanti", "Eddison Prendas", 
            "Carlos Alejandro Amador Luna", "Carlos Ortiz", "David Vogler", "Valerie Alfaro", 
            "Jose Maria Cartin Peralta", "Samuel Carballo", "Luis Fernando Ruiz"
        ],
        "Calculo Chats": [
            "Elena Rojas", "Elliot Navarro", "Julian Mena", "Sebastian Puerta", 
            "Maria Jose Quiros Quiros", "Naomy Sanchez", "Adrian Navarro", "Diego Matamoros", 
            "Carolina Castro", "Isaac Barrantes Alvarado", "Pablo Guzman", "Anilu Guzman Villalobos", 
            "Sheydron Clark", "Keisha Cross Brown", "Marlon Wright"
        ],
        "Calculo Processing Squad": [
            "Carlos Amador", "Fer Blanco", "Graciela Bravo", "Ignacio Blanco", 
            "Kevin Zamora", "Sebastian Rivera", "Silvana Suarez"
        ]
    };

    if (!localStorage.getItem('wfm_core_db')) {
        localStorage.setItem('wfm_core_db', JSON.stringify(initialDataset));
    }

    let activeSelectedAgent = "";
    let activeSelectedCluster = "";
    let adminAuthorized = false;

    window.onload = function() {
        populateDropdowns();
    };

    function getDB() { return JSON.parse(localStorage.getItem('wfm_core_db')); }
    
    function setDB(data) { 
        localStorage.setItem('wfm_core_db', JSON.stringify(data)); 
        populateDropdowns();
    }

    // Poblar de forma limpia los dropdowns correspondientes
    function populateDropdowns() {
        const db = getDB();
        
        const config = [
            { id: 'dd-phones', labelId: 'lbl-phones', key: 'Calculo Phones' },
            { id: 'dd-chats', labelId: 'lbl-chats', key: 'Calculo Chats' },
            { id: 'dd-proc', labelId: 'lbl-proc', key: 'Calculo Processing Squad' }
        ];

        config.forEach(item => {
            const selectEl = document.getElementById(item.id);
            const labelEl = document.getElementById(item.labelId);
            const agents = db[item.key] || [];
            
            labelEl.textContent = `${item.key} [${agents.length}]`;
            
            // Guardar valor anterior para que no se resetee bruscamente si hay cambios admin
            const previousValue = selectEl.value;
            selectEl.innerHTML = '<option value="">Choose Agent...</option>';
            
            agents.forEach(agent => {
                const opt = document.createElement('option');
                opt.value = agent;
                opt.textContent = agent;
                selectEl.appendChild(opt);
            });

            if(activeSelectedCluster === item.key && agents.includes(activeSelectedAgent)) {
                selectEl.value = activeSelectedAgent;
            }
        });

        populateAdminDropdowns();
    }

    function handleDropdownSelection(selectEl, clusterName) {
        if (!selectEl.value) return;
        
        // Resetear los otros dropdowns para consistencia visual
        document.querySelectorAll('.cluster-dd').forEach(dd => {
            if(dd.id !== selectEl.id) dd.value = "";
        });

        activeSelectedAgent = selectEl.value;
        activeSelectedCluster = clusterName;

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('activeEditor').style.display = 'flex';
        
        document.getElementById('targetAgentName').textContent = activeSelectedAgent;
        document.getElementById('targetAgentCluster').textContent = `Cluster: ${clusterName}`;

        configureMatrixInputs(activeSelectedAgent);
    }

    function configureMatrixInputs(name) {
        const specialRules = ["Luis Fernando Ruiz", "Marlon Wright", "Anilu Guzman Villalobos"];
        const blockWeekendOff = ["Keisha Cross Brown", ...specialRules];

        const isRestricted = specialRules.includes(name);
        const hasWeekendLimit = blockWeekendOff.includes(name);

        document.querySelectorAll('.day-select').forEach(select => {
            const day = select.getAttribute('data-day');
            const isWeekend = (day === 'Saturday' || day === 'Sunday');
            let optionsHTML = '';

            if (isRestricted) {
                optionsHTML += `
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                `;
            } else {
                optionsHTML += `
                    <option value="06:00 - 14:00">06:00 - 14:00</option>
                    <option value="07:00 - 15:00">07:00 - 15:00</option>
                    <option value="08:00 - 16:00">08:00 - 16:00</option>
                    <option value="09:00 - 17:00">09:00 - 17:00</option>
                    <option value="10:00 - 18:00">10:00 - 18:00</option>
                    <option value="11:00 - 19:00">11:00 - 19:00</option>
                    <option value="12:00 - 20:00">12:00 - 20:00</option>
                    <option value="13:00 - 21:00">13:00 - 21:00</option>
                    <option value="14:00 - 22:00">14:00 - 22:00</option>
                    <option value="15:00 - 23:00">15:00 - 23:00</option>
                `;
            }

            optionsHTML += `<option value="OPEN">OPEN</option>`;
            optionsHTML += `<option value="Vacaciones">Vacaciones</option>`;

            if (!(isWeekend && hasWeekendLimit)) {
                optionsHTML += `<option value="Day Off">Day Off</option>`;
            }

            select.innerHTML = optionsHTML;

            let log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
            let savedRecord = log.find(r => r.name === name);
            if (savedRecord && savedRecord.shifts[day]) {
                select.value = savedRecord.shifts[day];
            } else {
                select.selectedIndex = 0;
            }

            styleCell(select);
        });

        let log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
        let savedRecord = log.find(r => r.name === name);
        document.getElementById('nodeNotes').value = savedRecord ? savedRecord.notes : "";
    }

    // NUEVA FUNCIÓN: Generación de horario aleatorio inteligente (Randomize)
    function randomizeShifts() {
        if (!activeSelectedAgent) return;

        document.querySelectorAll('.day-select').forEach(select => {
            // Filtrar las opciones válidas: EXCLUIR 'Vacaciones' y 'OPEN'
            const validOptions = [];
            for (let i = 0; i < select.options.length; i++) {
                const val = select.options[i].value;
                if (val !== "Vacaciones" && val !== "OPEN") {
                    validOptions.push(val);
                }
            }

            if (validOptions.length > 0) {
                // Seleccionar un índice aleatorio del pool seguro
                const randomVal = validOptions[Math.floor(Math.random() * validOptions.length)];
                select.value = randomVal;
                styleCell(select);
            }
        });
    }

    function styleCell(elem) {
        elem.classList.remove('st-shift', 'st-off', 'st-vac', 'st-open');
        if (elem.value === "Day Off") elem.classList.add('st-off');
        else if (elem.value === "Vacaciones") elem.classList.add('st-vac');
        else if (elem.value === "OPEN") elem.classList.add('st-open');
        else elem.classList.add('st-shift');
    }

    function dismissEditor() {
        activeSelectedAgent = "";
        activeSelectedCluster = "";
        document.getElementById('activeEditor').style.display = 'none';
        document.getElementById('emptyState').style.display = 'flex';
        document.querySelectorAll('.cluster-dd').forEach(dd => dd.value = "");
    }

    function saveAgentMatrix() {
        const shifts = {};
        document.querySelectorAll('.day-select').forEach(sel => {
            shifts[sel.getAttribute('data-day')] = sel.value;
        });

        let log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
        log = log.filter(r => r.name !== activeSelectedAgent);

        log.push({
            name: activeSelectedAgent,
            cluster: activeSelectedCluster,
            shifts: shifts,
            notes: document.getElementById('nodeNotes').value || "None",
            updatedAt: new Date().toISOString()
        });

        localStorage.setItem('wfm_master_log', JSON.stringify(log));
        alert(`Parameters committed for ${activeSelectedAgent}`);
        dismissEditor();
    }

    // CONTROL ADMINISTRATIVO
    function unlockAdminConsole() {
        if (!adminAuthorized) {
            const verification = prompt("Access Key Required:");
            if (verification !== "Sups2019") { alert("Security Breach: Invalid Credentials."); return; }
            adminAuthorized = true;
            document.getElementById('lockBtn').style.display = "none";
            document.getElementById('adminConsoleGrid').style.opacity = "1";
            document.getElementById('adminConsoleGrid').style.pointerEvents = "auto";
        }
    }

    function populateAdminDropdowns() {
        const db = getDB();
        const moveSelect = document.getElementById('moveAssetSelect');
        const purgeSelect = document.getElementById('purgeAssetSelect');

        moveSelect.innerHTML = '<option value="">Select Asset...</option>';
        purgeSelect.innerHTML = '<option value="">Select Target...</option>';

        Object.keys(db).forEach(cluster => {
            db[cluster].forEach(name => {
                const optString = JSON.stringify({name, cluster});
                moveSelect.appendChild(new Option(`${name} (${cluster})`, optString));
                purgeSelect.appendChild(new Option(`${name} (${cluster})`, optString));
            });
        });
    }

    function addAsset() {
        const name = document.getElementById('newAssetName').value.trim();
        const cluster = document.getElementById('newAssetCluster').value;
        if (!name) return alert("Blank spaces not permitted.");

        const db = getDB();
        if (db[cluster].includes(name)) return alert("Asset definition already matching target.");

        db[cluster].push(name);
        db[cluster].sort();
        setDB(db);
        document.getElementById('newAssetName').value = "";
    }

    function moveAsset() {
        const raw = document.getElementById('moveAssetSelect').value;
        const targetCluster = document.getElementById('moveAssetTarget').value;
        if(!raw) return alert("Select active node.");

        const asset = JSON.parse(raw);
        if(asset.cluster === targetCluster) return alert("Asset current cluster matches destination.");

        const db = getDB();
        db[asset.cluster] = db[asset.cluster].filter(n => n !== asset.name);
        db[targetCluster].push(asset.name);
        db[targetCluster].sort();
        setDB(db);
    }

    function purgeAsset() {
        const raw = document.getElementById('purgeAssetSelect').value;
        if(!raw) return alert("Select target node.");

        const asset = JSON.parse(raw);
        if(!confirm(`Authorize destruction logs for ${asset.name}?`)) return;

        const db = getDB();
        db[asset.cluster] = db[asset.cluster].filter(n => n !== asset.name);
        setDB(db);
    }

    // EXPORTACIÓN A EXCEL MANTENIENDO CALIDAD Y COLORES ORIGINALES
    async function exportDataToExcel() {
        const auth = prompt("Identity Validation Challenge:");
        if (auth !== "Sups2019") return alert("Unauthorized access logged.");

        const log = JSON.parse(localStorage.getItem('wfm_master_log')) || [];
        if(!log.length) return alert("No operation lines scheduled on database cache.");

        const workbook = new ExcelJS.Workbook();
        const clusters = ["Calculo Phones", "Calculo Chats", "Calculo Processing Squad"];

        clusters.forEach(cName => {
            const entries = log.filter(l => l.cluster === cName);
            if(!entries.length) return;

            const sheet = workbook.addWorksheet(cName);
            sheet.columns = [
                { header: 'Agent Name', key: 'name', width: 28 },
                { header: 'Monday', key: 'Monday', width: 15 },
                { header: 'Tuesday', key: 'Tuesday', width: 15 },
                { header: 'Wednesday', key: 'Wednesday', width: 15 },
                { header: 'Thursday', key: 'Thursday', width: 15 },
                { header: 'Friday', key: 'Friday', width: 15 },
                { header: 'Saturday', key: 'Saturday', width: 15 },
                { header: 'Sunday', key: 'Sunday', width: 15 },
                { header: 'Operational Remarks', key: 'notes', width: 32 }
            ];

            const headerRow = sheet.getRow(1);
            headerRow.height = 30;
            headerRow.font = { bold: true, color: { argb: 'FFFFFF' }, name: 'Segoe UI', size: 11 };
            headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '121620' } };
            headerRow.alignment = { vertical: 'middle', horizontal: 'center' };

            entries.forEach(entry => {
                const combinedRow = { name: entry.name, notes: entry.notes, ...entry.shifts };
                const excelRow = sheet.addRow(combinedRow);
                excelRow.height = 24;

                excelRow.getCell('name').font = { bold: true, name: 'Segoe UI' };
                excelRow.getCell('name').alignment = { vertical: 'middle' };

                ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].forEach(day => {
                    const cell = excelRow.getCell(day);
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.font = { name: 'Segoe UI', size: 10 };

                    let bg = "FFFFFF"; let fg = "000000";
                    if(combinedRow[day] === "Day Off") { bg = "FFD2D2"; fg = "D63031"; }
                    else if(combinedRow[day] === "Vacaciones") { bg = "FFEAA7"; fg = "E17055"; }
                    else if(combinedRow[day] === "OPEN") { bg = "D4EDDA"; fg = "155724"; }
                    else { bg = "E1F5FE"; fg = "0288D1"; }

                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bg } };
                    cell.font.color = { argb: fg };
                });
            });
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const trigger = document.createElement("a");
        trigger.href = URL.createObjectURL(blob);
        trigger.download = `WFM_Tactical_Master.xlsx`;
        trigger.click();
    }
</script>
</body>
</html>
